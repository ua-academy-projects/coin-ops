<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Курс USD від НБУ</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            color: #1f2937;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 520px;
            background: #fff;
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        h1 {
            margin: 0 0 10px;
            font-size: 28px;
        }

        p {
            margin: 0 0 16px;
            color: #4b5563;
        }

        .rate {
            font-size: 42px;
            font-weight: bold;
            margin: 20px 0 10px;
        }

        .meta {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 20px;
        }

        button {
            border: none;
            background: #2563eb;
            color: white;
            padding: 12px 18px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        .error {
            margin-top: 16px;
            color: #b91c1c;
            font-size: 14px;
        }

        .loading {
            color: #2563eb;
            font-size: 14px;
            margin-top: 12px;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Курс долара США</h1>
        <p>Дані отримуються з API Національного банку України.</p>

        <div id="rate" class="rate">--</div>
        <div id="meta" class="meta">Завантаження...</div>

        <button onclick="loadRate()">Оновити курс</button>
        <div id="status"></div>
    </div>

    <script>
        async function loadRate() {
            const rateEl = document.getElementById('rate');
            const metaEl = document.getElementById('meta');
            const statusEl = document.getElementById('status');

            statusEl.className = 'loading';
            statusEl.textContent = 'Отримую дані...';

            try {
                const response = await fetch('https://bank.gov.ua/NBUStatService/v1/statdirectory/exchange?valcode=USD&json');

                if (!response.ok) {
                    throw new Error(`HTTP error: ${response.status}`);
                }

                const data = await response.json();

                if (!Array.isArray(data) || data.length === 0) {
                    throw new Error('API повернуло порожню відповідь');
                }

                const usd = data[0];

                rateEl.textContent = `${usd.rate.toFixed(2)} грн`;
                metaEl.textContent = `Валюта: ${usd.cc} | Дата: ${usd.exchangedate}`;

                statusEl.className = '';
                statusEl.textContent = 'Дані успішно оновлено';
            } catch (error) {
                rateEl.textContent = '--';
                metaEl.textContent = 'Не вдалося завантажити курс';
                statusEl.className = 'error';
                statusEl.textContent = 'Помилка: ' + error.message;
            }
        }

        loadRate();
    </script>
</body>

</html>
