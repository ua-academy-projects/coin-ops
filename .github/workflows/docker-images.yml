name: Build Docker images

on:
  push:
    branches:
      - Shabat
      - dev
    tags:
      - "v*.*.*"
    paths:
      - ".github/workflows/docker-images.yml"
      - "proxy/**"
      - "history/**"
      - "ui-react/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  OWNER: ua-academy-projects

jobs:
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: proxy
            image: coin-ops-proxy
            context: ./proxy
            dockerfile: ./proxy/Dockerfile
          - service: history-api
            image: coin-ops-history-api
            context: ./history
            dockerfile: ./history/Dockerfile.api
          - service: history-consumer
            image: coin-ops-history-consumer
            context: ./history
            dockerfile: ./history/Dockerfile.consumer
          - service: ui
            image: coin-ops-ui
            context: ./ui-react
            dockerfile: ./ui-react/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: image-meta
        shell: bash
        run: |
          image="${REGISTRY}/${OWNER}/${{ matrix.image }}"
          tags="${image}:${GITHUB_SHA}"
          version="${GITHUB_SHA}"

          if [[ "${GITHUB_REF_TYPE}" == "branch" && "${GITHUB_REF_NAME}" == "Shabat" ]]; then
            tags="${tags}"$'\n'"${image}:shabat-latest"
          fi

                     
          if [[ "${GITHUB_REF_TYPE}" == "branch" && "${GITHUB_REF_NAME}" == "dev" ]]; then
            tags="${tags}"$'\n'"${image}:dev-latest"
          fi


          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tags="${tags}"$'\n'"${image}:${GITHUB_REF_NAME}"
            version="${GITHUB_REF_NAME}"
          fi

          {
            echo "tags<<EOF"
            echo "${tags}"
            echo "EOF"
            echo "version=${version}"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.image-meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.image-meta.outputs.version }}
