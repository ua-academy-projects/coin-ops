name: PR Checks

on:
  pull_request:
    branches:
      - dev

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ui-react

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui-react/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test:run --if-present

      - name: Build frontend
        run: npm run build

  go:
    name: Go
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: proxy

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: proxy/go.mod

      - name: Run tests
        run: go test ./...

      - name: Build Go project
        run: go build ./...

  python:
    name: Python
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: history

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug Postgres Crash (Smoke Test)
        run: |
          docker run --name debug-postgres -d \
            -e POSTGRES_USER=coinops \
            -e POSTGRES_PASSWORD=test \
            -e POSTGRES_DB=coinops \
            -v ${{ github.workspace }}:/repo:ro \
            -v ${{ github.workspace }}/tests/python/integration/postgres_bootstrap.sh:/docker-entrypoint-initdb.d/10-coinops-bootstrap.sh:ro \
            quay.io/tembo/pg16-pgmq@sha256:7f80d046257d585d1af9d19cf28bd355a4b854b0a7d643c02ebbe6b84457868a \
            postgres -c cron.database_name=coinops
          
          sleep 10
          docker logs debug-postgres
          docker rm -f debug-postgres || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies and Ruff
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt ruff

      - name: Run Ruff
        run: ruff check .

      - name: Check Python syntax
        run: python -m py_compile main.py consumer.py

      - name: Run unit tests
        working-directory: .
        run: python -m pytest tests/python/unit -v

      - name: Run integration tests
        working-directory: .
        run: python -m pytest tests/python/integration -v

  docker:
    name: Docker
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: proxy
            context: ./proxy
            dockerfile: ./proxy/Dockerfile
          - service: history-api
            context: ./history
            dockerfile: ./history/Dockerfile.api
          - service: history-consumer
            context: ./history
            dockerfile: ./history/Dockerfile.consumer
          - service: ui
            context: ./ui-react
            dockerfile: ./ui-react/Dockerfile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image for ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
