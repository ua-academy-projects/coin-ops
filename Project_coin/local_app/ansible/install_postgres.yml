---
- name: Install and configure PostgreSQL
  hosts: db
  become: true
  vars:
    ansible_remote_tmp: /tmp/.ansible
    postgres_port: 5432
    consumer_dir: /opt/nbu-consumer
    consumer_service_name: nbu-rabbit-consumer
    rabbitmq_host: 192.168.56.13
    rabbitmq_port: 5672
    rabbitmq_user: nbu_consumer
    rabbitmq_password: "NBUConsumerPass123!"
    rabbitmq_queue: nbu.exchange.rates
    postgres_host: 127.0.0.1
    postgres_db: app_db
    postgres_user: app_user
    postgres_password: "StrongPassword123!"

    postgres_databases:
      - app_db

    postgres_users:
      - name: app_user
        password: "StrongPassword123!"
        db: app_db

  tasks:
    - name: Ensure Ansible temp directory exists
      file:
        path: /tmp/.ansible
        state: directory
        mode: "0777"

    - name: Install PostgreSQL
      apt:
        name:
          - postgresql
          - postgresql-contrib
          - python3-psycopg2
          - python3-pika
          - acl
        state: present
        update_cache: true

    - name: Start PostgreSQL
      service:
        name: postgresql
        state: started
        enabled: true

    - name: Detect installed PostgreSQL version
      shell: "ls /etc/postgresql | sort -V | tail -n 1"
      register: postgres_version_cmd
      changed_when: false

    - name: Set PostgreSQL version fact
      set_fact:
        postgres_version: "{{ postgres_version_cmd.stdout }}"

    - name: Allow remote connections in postgresql.conf
      replace:
        path: "/etc/postgresql/{{ postgres_version }}/main/postgresql.conf"
        regexp: "^#?listen_addresses\\s*=.*"
        replace: "listen_addresses = '*'"
      notify: restart postgresql

    - name: Allow remote connections in pg_hba.conf
      blockinfile:
        path: "/etc/postgresql/{{ postgres_version }}/main/pg_hba.conf"
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          host    all             all             0.0.0.0/0               md5
          host    all             all             ::/0                    md5
      notify: restart postgresql

    - name: Restart PostgreSQL before creating DB objects
      meta: flush_handlers

    - name: Create database
      become: true
      become_user: postgres
      become_method: sudo
      community.postgresql.postgresql_db:
        name: "{{ item }}"
        state: present
      loop: "{{ postgres_databases }}"

    - name: Create users
      become: true
      become_user: postgres
      community.postgresql.postgresql_user:
        name: "{{ item.name }}"
        password: "{{ item.password }}"
        state: present
        role_attr_flags: LOGIN
      loop: "{{ postgres_users }}"

    - name: Grant privileges
      become: true
      become_user: postgres
      community.postgresql.postgresql_privs:
        db: "{{ item.db }}"
        roles: "{{ item.name }}"
        privs: ALL
        type: database
      loop: "{{ postgres_users }}"
    - name: Create exchange_rates table
      become: true
      become_user: postgres
      become_method: sudo
      community.postgresql.postgresql_query:
        db: "{{ postgres_db }}"
        query: |
          CREATE TABLE IF NOT EXISTS exchange_rates (
              id BIGSERIAL PRIMARY KEY,
              r030 INTEGER NOT NULL,
              txt TEXT NOT NULL,
              rate NUMERIC(18,6) NOT NULL,
              cc VARCHAR(16) NOT NULL,
              exchange_date DATE NOT NULL,
              collected_at TIMESTAMPTZ NOT NULL,
              created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
              UNIQUE (cc, exchange_date, collected_at)
          );

    - name: Grant table privileges to app user
      become: true
      become_user: postgres
      become_method: sudo
      community.postgresql.postgresql_query:
        db: "{{ postgres_db }}"
        query: |
          ALTER TABLE exchange_rates OWNER TO {{ postgres_user }};
          GRANT ALL PRIVILEGES ON TABLE exchange_rates TO {{ postgres_user }};
          GRANT USAGE, SELECT ON SEQUENCE exchange_rates_id_seq TO {{ postgres_user }};

    - name: Ensure consumer directory exists
      file:
        path: "{{ consumer_dir }}"
        state: directory
        mode: "0755"

    - name: Install RabbitMQ to PostgreSQL consumer
      copy:
        src: consumer.py
        dest: "{{ consumer_dir }}/consumer.py"
        mode: "0755"

    - name: Create systemd service for RabbitMQ consumer
      copy:
        dest: "/etc/systemd/system/{{ consumer_service_name }}.service"
        mode: "0644"
        content: |
          [Unit]
          Description=NBU RabbitMQ to PostgreSQL Consumer
          After=network-online.target postgresql.service
          Wants=network-online.target

          [Service]
          Type=simple
          WorkingDirectory={{ consumer_dir }}
          ExecStart=/usr/bin/python3 {{ consumer_dir }}/consumer.py
          Environment="RABBITMQ_HOST={{ rabbitmq_host }}"
          Environment="RABBITMQ_PORT={{ rabbitmq_port }}"
          Environment="RABBITMQ_VHOST=/"
          Environment="RABBITMQ_USER={{ rabbitmq_user }}"
          Environment="RABBITMQ_PASSWORD={{ rabbitmq_password }}"
          Environment="RABBITMQ_QUEUE={{ rabbitmq_queue }}"
          Environment="POSTGRES_HOST={{ postgres_host }}"
          Environment="POSTGRES_PORT={{ postgres_port }}"
          Environment="POSTGRES_DB={{ postgres_db }}"
          Environment="POSTGRES_USER={{ postgres_user }}"
          Environment="POSTGRES_PASSWORD={{ postgres_password }}"
          Restart=always
          RestartSec=5
          User=root

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd
      systemd:
        daemon_reload: true

    - name: Enable and start consumer service
      systemd:
        name: "{{ consumer_service_name }}"
        enabled: true
        state: restarted

  handlers:
    - name: restart postgresql
      service:
        name: postgresql
        state: restarted
