# Smoke-only gateway config. Mirrors the routes node-03 serves in production
# (see ansible/roles/ui/templates/nginx.gateway.conf.j2) but:
#   - no TLS
#   - serves a tiny placeholder HTML at /, not the built React bundle
#   - targets are compose service names, not VM IPs
server {
    listen 80 default_server;
    server_name _;

    location = /health {
        access_log off;
        add_header Content-Type application/json;
        return 200 '{"status":"ok"}';
    }

    location = / {
        add_header Content-Type text/html;
        return 200 '<!doctype html><title>coin-ops smoke</title><h1>smoke gateway up</h1>';
    }

    location /api/ {
        proxy_pass http://proxy:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /history-api/ {
        proxy_pass http://history-api:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
