---
# GCP dynamic inventory — google.cloud.gcp_compute plugin.
# Credentials: auth_kind=application uses GOOGLE_APPLICATION_CREDENTIALS/ADC.
#
# NOTE: hostnames: only accepts predefined values (name, public_ip, private_ip).
# Jinja2 templates are NOT supported here — "gcp-{{ name }}" is invalid.
# GCP instance names are resource identifiers and cannot be renamed without
# recreation, so bare names (app-1, app-2, jump-host) are used.
# Use --limit gcp or --limit aws to target a specific cloud.

plugin: google.cloud.gcp_compute
auth_kind: application

# Project ID is not sensitive — matches TF_VAR_gcp_project_id in config.json.
# Listed explicitly because the plugin cannot use Jinja lookups for this key.
projects:
  - project-6f41102f-c77c-46a3-aac
hostnames:
  - name

keyed_groups:
  # → role_jump_host, role_app_ui, role_app_backend (hyphens sanitized to underscores)
  - key: labels.role
    prefix: role
    separator: "_"
  # → group "gcp" (used by ProxyJump intersect logic in group_vars)
  - key: labels.cloud
    prefix: ""
    separator: ""

compose:
  # Public IP only for jump-host. All workload nodes use private IP and are reached via ProxyJump.
  ansible_host: >-
    networkInterfaces[0].accessConfigs[0].natIP
    if (labels.get('role') == 'jump-host' and networkInterfaces[0].get('accessConfigs', []))
    else networkInterfaces[0].networkIP
  ansible_user: "'coinops'"
  ansible_port: "53725"
  cloud: "'gcp'"
