---
# AWS dynamic inventory — amazon.aws.aws_ec2 plugin.
# Credentials: use the standard AWS SDK credential chain.
#
# NOTE: hostnames: Jinja2 templates (e.g. "aws-{{ ec2_tags.Name }}") are not
# supported in this version of the plugin — they render literally.
# Instead, the "aws-" prefix is baked into the Name tag by Terraform:
#   tags = { Name = "aws-${each.key}" }  ← in modules/cloud/aws/instances/main.tf
# This means tag:Name gives aws-app-1, aws-app-2, aws-jump-host.

plugin: amazon.aws.aws_ec2
regions:
  # Match the active AWS region from the operator environment when available.
  # Keep a sane fallback so inventory discovery still works in the default repo setup.
  - "{{ lookup('env', 'AWS_REGION') | default(lookup('env', 'TF_VAR_aws_region'), true) | default('eu-central-1', true) }}"

filters:
  tag:Project: coin-ops
  instance-state-name: running

hostnames:
  - tag:Name

keyed_groups:
  # → role_jump_host, role_app_ui, role_app_backend (hyphens sanitized to underscores)
  - key: tags.Role
    prefix: role
    separator: "_"
  # → group "aws" (used by ProxyJump intersect logic in group_vars)
  - key: "'aws'"
    prefix: ""
    separator: ""

compose:
  # Public IP only for jump-host. All workload nodes use private IP and are reached via ProxyJump.
  ansible_host: "(public_ip_address | default('')) if tags.get('Role') == 'jump-host' and (public_ip_address | default('')) != '' else private_ip_address"
  ansible_port: "53725"
  cloud: "'aws'"
