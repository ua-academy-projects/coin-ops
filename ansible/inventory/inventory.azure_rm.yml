---
# Azure dynamic inventory - azure.azcollection.azure_rm plugin.
# Credentials: use the generated ARM_* environment variables from bootstrap-azure.sh.

plugin: azure.azcollection.azure_rm
auth_source: env
plain_host_names: true

hostnames:
  - tags.inventoryName
  - default

keyed_groups:
  - key: tags.role
    prefix: role
    separator: "_"
  - key: "'azure'"
    prefix: ""
    separator: ""

compose:
  ansible_host: >-
    (
      (
        (public_dns_hostnames | default([]))
        + (public_ipv4_addresses | default([]))
        + (public_ipv4_address | default([]))
      ) | first
    ) if (
      (tags.role | default('')) == 'jump-host'
      and (
        (
          (public_dns_hostnames | default([]))
          + (public_ipv4_addresses | default([]))
          + (public_ipv4_address | default([]))
        ) | length > 0
      )
    ) else ((private_ipv4_addresses | default([])) | first)
  ansible_port: "53725"
  cloud: "'azure'"
