# Stable non-secret configuration lives in ansible/vars/deploy-config.yml.
# Runtime secrets come from GCP Secret Manager.

repo_root: >-
  {{
    (inventory_dir | dirname | dirname)
    if (inventory_dir is defined)
    else (playbook_dir | dirname)
  }}
deploy_defaults: "{{ lookup('file', repo_root ~ '/ansible/vars/deploy-config.yml') | from_yaml }}"
local_generated_config_path: "{{ repo_root ~ '/ansible/vars/local.generated.json' }}"
local_generated_config_text: "{{ lookup('file', local_generated_config_path, errors='ignore') | default('{}', true) | string }}"
local_generated_config: >-
  {{
    ((local_generated_config_text | trim | length) > 0)
    | ternary((local_generated_config_text | from_json), {})
  }}
deploy_config: "{{ deploy_defaults | combine(local_generated_config, recursive=True) }}"
runtime_metadata_path: "{{ repo_root ~ '/terraform/config/ansible-runtime.json' }}"
runtime_metadata_text: "{{ lookup('file', runtime_metadata_path, errors='ignore') | default('{}', true) | string }}"
runtime_metadata: >-
  {{
    ((runtime_metadata_text | trim | length) > 0)
    | ternary((runtime_metadata_text | from_json), {})
  }}

my_cloud: "{{ cloud | default('gcp' if 'gcp' in groups else ('aws' if 'aws' in groups else '')) }}"
cloud_runtime_metadata: "{{ runtime_metadata.get(my_cloud, {}) }}"

ansible_ssh_private_key_file: "{{ lookup('env', 'SSH_KEY_PATH') | default(lookup('env', 'HOME') ~ '/.ssh/ssh-key-coin-ops', true) }}"
ansible_ssh_common_args: >-
  -o StrictHostKeyChecking=no
  -o UserKnownHostsFile=/dev/null
  -o IdentitiesOnly=yes
  -F {{ repo_root ~ '/terraform/config/ssh_config' }}
  {{ '-o ProxyJump=coinops-' ~ my_cloud ~ '-jump-host' if 'role_jump_host' not in group_names else '' }}

gcp_project: "{{ deploy_config.gcp_project }}"
gcp_service_account_file: "{{ repo_root ~ '/terraform/sa-key.json' }}"

db_secrets_raw: "{{ lookup('google.cloud.gcp_secret_manager', key='coinops-db-secrets', project=gcp_project, auth_kind='serviceaccount', service_account_file=gcp_service_account_file) if my_cloud == 'gcp' else '{}' }}"
app_secrets_raw: "{{ lookup('google.cloud.gcp_secret_manager', key='coinops-app-secrets', project=gcp_project, auth_kind='serviceaccount', service_account_file=gcp_service_account_file) if my_cloud == 'gcp' else '{}' }}"
db_secrets: "{{ db_secrets_raw if (db_secrets_raw is mapping) else (db_secrets_raw | from_json) }}"
app_secrets: "{{ app_secrets_raw if (app_secrets_raw is mapping) else (app_secrets_raw | from_json) }}"

db_password: "{{ db_secrets.DB_PASSWORD | default('', true) }}"
rabbitmq_password: "{{ db_secrets.RABBITMQ_PASSWORD | default('', true) }}"
registry_token: "{{ app_secrets.GHCR_TOKEN | default('', true) }}"
cloudflare_api_token: "{{ app_secrets.CLOUDFLARE_API_TOKEN | default('', true) }}"

rabbitmq_user: cognitor
db_name: cognitor
db_user: cognitor

runtime_backend: "{{ lookup('env', 'RUNTIME_BACKEND') | default(deploy_config.runtime_backend, true) }}"
app_domain: "{{ lookup('env', 'APP_DOMAIN') | default(deploy_config.app_domain, true) }}"
tls_mode: "{{ lookup('env', 'TLS_MODE') | default(deploy_config.tls_mode, true) }}"
tls_enabled: true
certbot_email: "{{ lookup('env', 'CERTBOT_EMAIL') | default(deploy_config.certbot_email_localpart ~ '@' ~ app_domain, true) }}"

proxy_port: "{{ deploy_config.proxy_port }}"
history_port: "{{ deploy_config.history_port }}"
backend_ip: "{{ cloud_runtime_metadata.get('backend_private_ip', '127.0.0.1') }}"
postgres_bind_ip: "{{ cloud_runtime_metadata.get('database_ip', backend_ip) }}"
use_managed_db: "{{ cloud_runtime_metadata.get('use_managed_db', false) | bool }}"

tls_cert_dir: /etc/cognitor/tls
tls_cert_path: "{{ tls_cert_dir }}/coinops.crt"
tls_key_path: "{{ tls_cert_dir }}/coinops.key"

image_registry: "{{ lookup('env', 'IMAGE_REGISTRY') | default(deploy_config.image_registry, true) }}"
image_registry_host: "{{ image_registry.split('/')[0] }}"
image_tag: "{{ lookup('env', 'IMAGE_TAG') | default(deploy_config.image_tag, true) }}"
proxy_image: "{{ image_registry }}/coin-ops-proxy:{{ image_tag }}"
history_api_image: "{{ image_registry }}/coin-ops-history-api:{{ image_tag }}"
history_consumer_image: "{{ image_registry }}/coin-ops-history-consumer:{{ image_tag }}"
ui_image: "{{ image_registry }}/coin-ops-ui:{{ image_tag }}"
postgres_runtime_image: "{{ image_registry }}/coin-ops-postgres-runtime:{{ image_tag }}"
postgres_image: "{{ postgres_runtime_image if runtime_backend == 'postgres' else 'postgres:16-alpine' }}"
registry_username: "{{ lookup('env', 'GHCR_USERNAME') | default(deploy_config.registry_username, true) }}"

rabbitmq_url: "amqp://{{ rabbitmq_user }}:{{ rabbitmq_password }}@{{ backend_ip }}:5672/"
internal_rabbitmq_url: "amqp://{{ rabbitmq_user }}:{{ rabbitmq_password }}@rabbitmq:5672/"
app_database_url: "postgresql://{{ db_user }}:{{ db_password }}@{{ postgres_bind_ip }}:5432/{{ db_name }}"
