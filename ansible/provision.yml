---
# provision.yml - install and validate host prerequisites.
# Run once (or re-run: idempotent).
#
#   ansible-playbook -i ansible/inventory ansible/provision.yml

- name: Validate provisioning contract
  hosts: localhost
  connection: local
  gather_facts: no
  tasks:
    - name: Validate configured runtime backend
      assert:
        that:
          - runtime_backend in ['external', 'postgres']
        fail_msg: |
          runtime_backend must be one of: external, postgres.
    - name: Validate GCP Secret Manager authentication path
      assert:
        that:
          - gcp_service_account_file | length > 0
        fail_msg: "Run terraform/bootstrap-gcp.sh and source local/generated-gcp-env.sh before running provision."
      when: "'gcp' in groups"

- name: Common setup - all nodes
  hosts: all
  become: yes
  gather_facts: no
  serial: 1
  pre_tasks:
    - name: Wait for SSH to become stable after instance boot
      wait_for_connection:
        timeout: "{{ provisioning_wait_for_connection_timeout | default(600) }}"
        connect_timeout: 10
        sleep: "{{ provisioning_wait_for_connection_sleep | default(5) }}"
        delay: "{{ provisioning_wait_for_connection_delay | default(5) }}"

    - name: Gather facts after SSH stabilizes
      setup:
  roles:
    - common
  post_tasks:
    - name: Flush handlers after host-level firewall changes
      meta: flush_handlers

- name: Docker runtime setup - workload nodes only
  hosts: role_app_ui:role_app_backend
  become: yes
  gather_facts: no
  roles:
    - docker

- name: Provision backend node (app-2) - data directories
  hosts: "{{ target_backend_group | default('role_app_backend') }}"
  become: yes
  gather_facts: no
  tasks:
    - name: Create PostgreSQL data directory
      file:
        path: /var/lib/coin-ops/postgres
        state: directory
        owner: 70
        group: 70
        mode: "0700"

    - name: Create RabbitMQ data directory
      file:
        path: /var/lib/coin-ops/rabbitmq
        state: directory
        owner: 999
        group: 999
        mode: "0755"

- name: Provision backend proxy node (app-2) - data directories
  hosts: "{{ target_backend_group | default('role_app_backend') }}"
  become: yes
  gather_facts: no
  tasks:
    - name: Create Redis data directory
      file:
        path: /var/lib/coin-ops/redis
        state: directory
        owner: 999
        group: 999
        mode: "0755"

- name: Provision UI node
  hosts: "{{ target_ui_group | default('role_app_ui') }}"
  become: yes
  gather_facts: no
  tasks:
    - name: No host-level provisioning required for UI node
      debug:
        msg: "UI node only needs Docker."
