---
# provision.yml — install system packages on all VMs.
# Run once (or re-run: idempotent).
#
#   ansible-playbook -i ansible/inventory ansible/provision.yml

- name: Validate provisioning contract
  hosts: localhost
  connection: local
  gather_facts: no
  tasks:
    - name: Validate configured runtime backend
      assert:
        that:
          - runtime_backend in ['external', 'postgres']
        fail_msg: |
          runtime_backend must be one of: external, postgres.
    - name: Validate GCP Secret Manager authentication path
      assert:
        that:
          - gcp_service_account_file | length > 0
        fail_msg: "Place terraform/sa-key.json in the repo and source local/generated-env.sh before running provision."
      when: "'gcp' in groups"

- name: Common setup — all nodes
  hosts: all
  become: yes
  roles:
    - common
    - docker

- name: Provision backend node (app-2) — Data directories
  hosts: "{{ target_backend_group | default('role_app_backend') }}"
  become: yes
  tasks:
    - name: Create PostgreSQL data directory
      file:
        path: /var/lib/coin-ops/postgres
        state: directory
        owner: 70
        group: 70
        mode: '0700'

    - name: Create RabbitMQ data directory
      file:
        path: /var/lib/coin-ops/rabbitmq
        state: directory
        owner: 999
        group: 999
        mode: '0755'

- name: Provision backend proxy node (app-2) — Data directories
  hosts: "{{ target_backend_group | default('role_app_backend') }}"
  become: yes
  tasks:
    - name: Create Redis data directory
      file:
        path: /var/lib/coin-ops/redis
        state: directory
        owner: 999
        group: 999
        mode: '0755'

- name: Provision UI node
  hosts: "{{ target_ui_group | default('role_app_ui') }}"
  become: yes
  tasks:
    - name: No host-level provisioning required for UI node
      debug:
        msg: "UI node only needs Docker."
