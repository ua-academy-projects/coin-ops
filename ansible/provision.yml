---
# provision.yml — install system packages on all VMs.
# Run once (or re-run: idempotent).
#
#   source .env
#   ansible-playbook -i ansible/inventory ansible/provision.yml

- name: Validate required environment variables
  hosts: localhost
  connection: local
  tasks:
    - name: Check .env vars are exported
      assert:
        that:
          - lookup('env', 'RUNTIME_BACKEND') in ['', 'external', 'postgres']
        fail_msg: |
          Required environment variables are not set or RUNTIME_BACKEND is invalid.
          Run:  source .env
          RUNTIME_BACKEND may be empty and will default to external.
          Supported explicit runtime backends: external, postgres.
          Then retry: ansible-playbook -i ansible/inventory ansible/provision.yml

- name: Common setup — all nodes
  hosts: all
  become: yes
  roles:
    - common
    - docker

- name: Provision backend node (app-2) — Data directories
  hosts: "{{ target_backend_group | default('role_app_backend') }}"
  become: yes
  tasks:
    - name: Create PostgreSQL data directory
      file:
        path: /var/lib/coin-ops/postgres
        state: directory
        owner: 70
        group: 70
        mode: '0700'

    - name: Create RabbitMQ data directory
      file:
        path: /var/lib/coin-ops/rabbitmq
        state: directory
        owner: 999
        group: 999
        mode: '0755'

- name: Provision backend proxy node (app-2) — Data directories
  hosts: "{{ target_backend_group | default('role_app_backend') }}"
  become: yes
  tasks:
    - name: Create Redis data directory
      file:
        path: /var/lib/coin-ops/redis
        state: directory
        owner: 999
        group: 999
        mode: '0755'

- name: Provision UI node
  hosts: "{{ target_ui_group | default('role_app_ui') }}"
  become: yes
  tasks:
    - name: No host-level provisioning required for UI node
      debug:
        msg: "UI node only needs Docker."
