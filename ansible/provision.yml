---
# provision.yml — install system packages on all VMs.
# Run once (or re-run: idempotent).
#
#   source .env
#   ansible-playbook -i ansible/inventory ansible/provision.yml

- name: Validate required environment variables
  hosts: localhost
  connection: local
  tasks:
    - name: Check .env vars are exported
      assert:
        that:
          - lookup('env', 'RABBITMQ_PASSWORD') != ''
          - lookup('env', 'DB_PASSWORD') != ''
          - lookup('env', 'SSH_KEY_PATH') != ''
        fail_msg: |
          Required environment variables are not set.
          Run:  source .env
          Then retry: ansible-playbook -i ansible/inventory ansible/provision.yml

- name: Common setup — all nodes
  hosts: all
  become: yes
  roles:
    - common

- name: Provision history node — PostgreSQL + RabbitMQ + Python
  hosts: history
  become: yes
  tasks:
    - name: Install PostgreSQL
      apt:
        name:
          - postgresql
          - postgresql-contrib
          - python3-psycopg2   # needed by Ansible postgresql_* modules
        state: present

    - name: Install RabbitMQ
      apt:
        name: rabbitmq-server
        state: present

    - name: Install Python runtime
      apt:
        name:
          - python3
          - python3-venv
          - python3-pip
        state: present

    - name: Enable and start PostgreSQL
      systemd:
        name: postgresql
        enabled: yes
        state: started

    - name: Enable and start RabbitMQ
      systemd:
        name: rabbitmq-server
        enabled: yes
        state: started

    - name: Create RabbitMQ user
      community.rabbitmq.rabbitmq_user:
        user: "{{ rabbitmq_user }}"
        password: "{{ rabbitmq_password }}"
        vhost: /
        configure_priv: ".*"
        read_priv: ".*"
        write_priv: ".*"
        state: present
      ignore_errors: yes   # fall back to shell task if collection absent

    - name: Create RabbitMQ user (shell fallback)
      shell: |
        rabbitmqctl add_user {{ rabbitmq_user }} {{ rabbitmq_password }} 2>/dev/null || true
        rabbitmqctl set_permissions -p / {{ rabbitmq_user }} ".*" ".*" ".*"
      changed_when: false

    - name: Create PostgreSQL user
      become_user: postgres
      postgresql_user:
        name: "{{ db_user }}"
        password: "{{ db_password }}"
        state: present

    - name: Create PostgreSQL database
      become_user: postgres
      postgresql_db:
        name: "{{ db_name }}"
        owner: "{{ db_user }}"
        state: present

- name: Provision proxy node — Go + Redis
  hosts: proxy
  become: yes
  tasks:
    - name: Remove apt-installed Go (too old for go-redis v9)
      apt:
        name:
          - golang-go
          - golang-src
        state: absent
        purge: yes
      ignore_errors: yes

    - name: Download Go 1.22 binary
      get_url:
        url: https://go.dev/dl/go1.22.1.linux-amd64.tar.gz
        dest: /tmp/go.tar.gz
        checksum: sha256:aab8e15785c997ae20f9c88422fe35e4be9a4184c4b8c703860c8f37bbefb847

    - name: Remove old Go installation
      file:
        path: /usr/local/go
        state: absent

    - name: Extract Go to /usr/local
      unarchive:
        src: /tmp/go.tar.gz
        dest: /usr/local
        remote_src: yes

    - name: Add Go to system PATH
      copy:
        dest: /etc/profile.d/go.sh
        content: 'export PATH=$PATH:/usr/local/go/bin'
        mode: '0755'

    - name: Install Redis
      apt:
        name: redis-server
        state: present

    - name: Enable and start Redis
      systemd:
        name: redis-server
        enabled: yes
        state: started

- name: Provision UI node — nginx
  hosts: ui
  become: yes
  tasks:
    - name: Install nginx
      apt:
        name: nginx
        state: present

    - name: Enable and start nginx
      systemd:
        name: nginx
        enabled: yes
        state: started
