---
# provision.yml - install and validate host prerequisites.
# Run once (or re-run: idempotent).
#
#   ansible-playbook -i ansible/inventory ansible/provision.yml

- name: Validate provisioning contract
  hosts: localhost
  connection: local
  gather_facts: no
  tasks:
    - name: Validate configured runtime backend
      assert:
        that:
          - runtime_backend in ['external', 'postgres']
        fail_msg: |
          runtime_backend must be one of: external, postgres.
    - name: Validate configured Secret Manager authentication path
      assert:
        that:
          - secret_backend in ['gcp', 'aws']
          - secret_backend != 'gcp' or gcp_project | length > 0
          - secret_backend != 'aws' or aws_region | length > 0
        fail_msg: "Run the bootstrap for the configured secret backend and source the generated local env before running provision."

- name: Common setup - all nodes
  hosts: all
  become: yes
  gather_facts: no
  serial: "{{ provisioning_host_batch_size | default(4) }}"
  strategy: free
  pre_tasks:
    - name: Wait for SSH to become stable after instance boot
      wait_for_connection:
        timeout: "{{ provisioning_wait_for_connection_timeout | default(600) }}"
        connect_timeout: 10
        sleep: "{{ provisioning_wait_for_connection_sleep | default(5) }}"
        delay: "{{ provisioning_wait_for_connection_delay | default(5) }}"

    - name: Gather facts after SSH stabilizes
      setup:
  roles:
    - common
  post_tasks:
    - name: Flush handlers after host-level firewall changes
      meta: flush_handlers

    - name: Reset SSH control connection after host-level firewall handlers
      meta: reset_connection

    - name: Wait for SSH after host-level firewall handlers
      wait_for_connection:
        timeout: "{{ provisioning_wait_for_connection_timeout | default(600) }}"
        connect_timeout: 10
        sleep: "{{ provisioning_wait_for_connection_sleep | default(5) }}"
        delay: 0

- name: Docker runtime setup - workload nodes only
  hosts: role_app_ui:role_app_backend
  become: yes
  gather_facts: no
  serial: "{{ provisioning_workload_batch_size | default(4) }}"
  strategy: free
  pre_tasks:
    - name: Reset SSH control connection before Docker setup
      meta: reset_connection

    - name: Wait for SSH to be stable before Docker setup
      wait_for_connection:
        timeout: "{{ provisioning_wait_for_connection_timeout | default(600) }}"
        connect_timeout: 10
        sleep: "{{ provisioning_wait_for_connection_sleep | default(5) }}"
        delay: 0
  roles:
    - docker

- name: Provision backend node (app-2) - data directories
  hosts: "{{ target_backend_group | default('role_app_backend') }}"
  become: yes
  gather_facts: no
  serial: "{{ provisioning_workload_batch_size | default(4) }}"
  tasks:
    - name: Create PostgreSQL data directory
      file:
        path: /var/lib/coin-ops/postgres
        state: directory
        owner: 70
        group: 70
        mode: "0700"

    - name: Create RabbitMQ data directory
      file:
        path: /var/lib/coin-ops/rabbitmq
        state: directory
        owner: 999
        group: 999
        mode: "0755"

- name: Provision backend proxy node (app-2) - data directories
  hosts: "{{ target_backend_group | default('role_app_backend') }}"
  become: yes
  gather_facts: no
  serial: "{{ provisioning_workload_batch_size | default(4) }}"
  tasks:
    - name: Create Redis data directory
      file:
        path: /var/lib/coin-ops/redis
        state: directory
        owner: 999
        group: 999
        mode: "0755"

- name: Provision UI node
  hosts: "{{ target_ui_group | default('role_app_ui') }}"
  become: yes
  gather_facts: no
  serial: "{{ provisioning_workload_batch_size | default(4) }}"
  tasks:
    - name: No host-level provisioning required for UI node
      debug:
        msg: "UI node only needs Docker."
