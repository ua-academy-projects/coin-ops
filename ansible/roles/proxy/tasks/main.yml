---
- name: Stop and disable legacy host services
  service:
    name: "{{ item }}"
    state: stopped
    enabled: no
  loop:
    - redis-server
    - cognitor-proxy
  failed_when: false

- name: Create secrets directory
  file:
    path: /etc/cognitor
    state: directory
    owner: root
    group: root
    mode: '0750'

- name: Write proxy environment file
  template:
    src: proxy.env.j2
    dest: /etc/cognitor/proxy.env
    owner: root
    group: root
    mode: '0640'

- name: Create proxy deploy directory
  file:
    path: /opt/cognitor/proxy
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Remove legacy proxy binary to make way for source directory
  file:
    path: /opt/cognitor/proxy/proxy
    state: absent

- name: Sync proxy source files
  synchronize:
    src: "{{ playbook_dir }}/../proxy/"
    dest: /opt/cognitor/proxy/proxy/
    delete: yes
    rsync_opts:
      - "--exclude=proxy"

- name: Sync compose file
  copy:
    src: "{{ playbook_dir }}/../deploy/compose/node-02.compose.yaml"
    dest: /opt/cognitor/proxy/compose.yaml

- name: Run Docker Compose
  command: docker compose -f /opt/cognitor/proxy/compose.yaml up -d --build --remove-orphans
  args:
    chdir: /opt/cognitor/proxy

- name: Wait for proxy health endpoint
  uri:
    url: "http://localhost:8080/health"
    method: GET
    status_code: 200
  retries: 12
  delay: 5
  register: result
  until: result.status == 200
