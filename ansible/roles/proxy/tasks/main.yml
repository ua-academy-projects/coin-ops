---
- name: Validate proxy database secret availability
  assert:
    that:
      - db_password | length > 0
    fail_msg: "DB_PASSWORD must be present in GCP Secret Manager secret coinops-db-secrets."

- name: Validate RabbitMQ secret availability
  assert:
    that:
      - rabbitmq_password | length > 0
    fail_msg: "RABBITMQ_PASSWORD must be present in GCP Secret Manager secret coinops-db-secrets when RUNTIME_BACKEND=external."
  when: runtime_backend == 'external'

- name: Stop and disable legacy host services
  service:
    name: "{{ item }}"
    state: stopped
    enabled: no
  loop:
    - redis-server
    - cognitor-proxy
  failed_when: false

- name: Allow incoming traffic on Proxy port (UFW)
  community.general.ufw:
    rule: allow
    port: "{{ proxy_port | string }}"
    proto: tcp
  when: not internal_tls_enabled

- name: Remove direct Proxy UFW allowance when internal TLS is enabled
  community.general.ufw:
    rule: allow
    port: "{{ proxy_port | string }}"
    proto: tcp
    delete: yes
  failed_when: false
  when: internal_tls_enabled

- name: Create proxy deploy directory
  file:
    path: /opt/cognitor/proxy
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Remove legacy synced proxy source or binary
  file:
    path: /opt/cognitor/proxy/proxy
    state: absent

- name: Render compose file
  template:
    src: "{{ playbook_dir }}/../deploy/compose/node-02.compose.yaml"
    dest: /opt/cognitor/proxy/compose.yaml

- name: Validate proxy compose configuration
  command: docker compose -f /opt/cognitor/proxy/compose.yaml config -q
  args:
    chdir: /opt/cognitor/proxy
  changed_when: false

- name: Pull proxy container images
  command: docker compose -f /opt/cognitor/proxy/compose.yaml pull
  args:
    chdir: /opt/cognitor/proxy
  register: proxy_pull_result
  retries: 3
  delay: 15
  until: proxy_pull_result.rc == 0

- name: Run Docker Compose
  command: docker compose -f /opt/cognitor/proxy/compose.yaml up -d --remove-orphans
  args:
    chdir: /opt/cognitor/proxy

- name: Wait for proxy health endpoint
  uri:
    url: "http://localhost:{{ proxy_port }}/health"
    method: GET
    status_code: 200
  retries: 12
  delay: 5
  register: result
  until: result.status == 200

- name: Remove dangling Docker images
  command: docker image prune -f
  changed_when: false
