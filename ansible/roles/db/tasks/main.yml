---
- name: Create secrets directory
  file:
    path: /etc/cognitor
    state: directory
    owner: root
    group: root
    mode: '0750'

- name: Write database environment file
  template:
    src: db.env.j2
    dest: /etc/cognitor/db.env
    owner: root
    group: root
    mode: '0640'

- name: Create database deploy directory
  file:
    path: /opt/cognitor/db
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Copy history schema
  copy:
    src: "{{ playbook_dir }}/../history/schema.sql"
    dest: /opt/cognitor/db/schema.sql
    owner: root
    group: root
    mode: '0644'

- name: Copy runtime SQL schema files
  copy:
    src: "{{ playbook_dir }}/../runtime/"
    dest: /opt/cognitor/db/runtime/
    owner: root
    group: root
    mode: '0644'

- name: Render database compose file
  template:
    src: "{{ playbook_dir }}/../deploy/compose/db.compose.yaml"
    dest: /opt/cognitor/db/compose.yaml

- name: Validate database compose configuration
  command: docker compose -f /opt/cognitor/db/compose.yaml config -q
  args:
    chdir: /opt/cognitor/db
  changed_when: false

- name: Stop PostgreSQL before repairing data directory ownership
  command: docker compose -f /opt/cognitor/db/compose.yaml stop postgres
  args:
    chdir: /opt/cognitor/db
  changed_when: false
  failed_when: false

- name: Repair PostgreSQL data directory ownership for selected Postgres image
  file:
    path: /var/lib/coin-ops/postgres
    state: directory
    owner: '70'
    group: '70'
    mode: '0700'
    recurse: yes

- name: Pull database container image
  command: docker compose -f /opt/cognitor/db/compose.yaml pull
  args:
    chdir: /opt/cognitor/db
  when: image_source != 'local'

- name: Start database container
  command: docker compose -f /opt/cognitor/db/compose.yaml up -d postgres
  args:
    chdir: /opt/cognitor/db

- name: Wait for database readiness
  command: "docker compose -f /opt/cognitor/db/compose.yaml exec -T postgres pg_isready -U {{ db_user }} -d {{ db_name }}"
  args:
    chdir: /opt/cognitor/db
  retries: 12
  delay: 5
  register: postgres_ready
  until: postgres_ready.rc == 0

- name: Apply application history schema
  shell: >-
    docker compose -f /opt/cognitor/db/compose.yaml exec -T postgres
    psql -v ON_ERROR_STOP=1 -U {{ db_user }} -d {{ db_name }}
    < /opt/cognitor/db/schema.sql
  args:
    chdir: /opt/cognitor/db
  changed_when: false

- name: Persist runtime application role before wrapper bootstrap
  command: >-
    docker compose -f /opt/cognitor/db/compose.yaml exec -T postgres
    psql -v ON_ERROR_STOP=1 -U {{ db_user }} -d {{ db_name }}
    -c "ALTER DATABASE {{ db_name }} SET runtime.app_role = '{{ db_user }}';"
  args:
    chdir: /opt/cognitor/db
  changed_when: false
  when: runtime_backend == "postgres"

- name: Apply runtime queue and session schema
  shell: |
    (
      printf "%s\n" "SET runtime.app_role = '{{ db_user }}';"
      cat \
        /opt/cognitor/db/runtime/01_schema.sql \
        /opt/cognitor/db/runtime/02_wrappers.sql \
        /opt/cognitor/db/runtime/03_notify.sql \
        /opt/cognitor/db/runtime/04_advisory.sql \
        /opt/cognitor/db/runtime/05_dlq.sql \
        /opt/cognitor/db/runtime/06_cache_schema.sql \
        /opt/cognitor/db/runtime/07_cache_wrappers.sql \
        /opt/cognitor/db/runtime/08_cron.sql
    ) | docker compose -f /opt/cognitor/db/compose.yaml exec -T postgres psql -v ON_ERROR_STOP=1 -U {{ db_user }} -d {{ db_name }}
  args:
    chdir: /opt/cognitor/db
  changed_when: false
  when: runtime_backend == "postgres"

