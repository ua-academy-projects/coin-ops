---
- name: Stop and disable legacy host services
  service:
    name: "{{ item }}"
    state: stopped
    enabled: no
  loop:
    - postgresql
    - rabbitmq-server
    - cognitor-history-consumer
    - cognitor-history-api
  failed_when: false

- name: Remove legacy history environment file
  file:
    path: /etc/cognitor/history.env
    state: absent

- name: Create history deploy directory
  file:
    path: /opt/cognitor/history
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Remove legacy synced history source
  file:
    path: /opt/cognitor/history/history
    state: absent

- name: Copy PostgreSQL history schema
  copy:
    src: "{{ playbook_dir }}/../history/schema.sql"
    dest: /opt/cognitor/history/schema.sql
    owner: root
    group: root
    mode: '0644'

- name: Copy runtime SQL schema files
  copy:
    src: "{{ playbook_dir }}/../runtime/"
    dest: /opt/cognitor/history/runtime/
    owner: root
    group: root
    mode: '0644'

- name: Render compose file
  template:
    src: "{{ playbook_dir }}/../deploy/compose/node-01.compose.yaml"
    dest: /opt/cognitor/history/compose.yaml
    owner: root
    group: root
    mode: '0644'

- name: Validate history compose configuration
  command: docker compose -f /opt/cognitor/history/compose.yaml config -q
  args:
    chdir: /opt/cognitor/history
  environment: "{{ history_compose_environment }}"
  changed_when: false
  no_log: true

- name: Pull PostgreSQL client image for Cloud SQL schema tasks
  command: docker pull postgres:16-alpine
  environment:
    DOCKER_CONFIG: "{{ docker_auth_config_dir }}"
  when: database_backend == 'cloudsql'

- name: Pull history container images
  command: docker compose -f /opt/cognitor/history/compose.yaml pull
  args:
    chdir: /opt/cognitor/history
  environment: "{{ history_compose_environment }}"
  no_log: true

- name: Start local PostgreSQL dependency first
  command: docker compose -f /opt/cognitor/history/compose.yaml up -d postgres
  args:
    chdir: /opt/cognitor/history
  environment: "{{ history_compose_environment }}"
  when: database_backend == 'local'
  no_log: true

- name: Wait for local PostgreSQL readiness
  command: docker compose -f /opt/cognitor/history/compose.yaml exec -T postgres pg_isready -U {{ db_user }} -d {{ db_name }}
  args:
    chdir: /opt/cognitor/history
  environment: "{{ history_compose_environment }}"
  retries: 12
  delay: 5
  register: postgres_ready
  until: postgres_ready.rc == 0
  when: database_backend == 'local'
  no_log: true

- name: Apply schema to local PostgreSQL
  shell: >-
    docker compose -f /opt/cognitor/history/compose.yaml exec -T postgres
    psql -v ON_ERROR_STOP=1 -U {{ db_user }} -d {{ db_name }}
    < /opt/cognitor/history/schema.sql
  args:
    chdir: /opt/cognitor/history
  environment: "{{ history_compose_environment }}"
  changed_when: false
  when: database_backend == 'local'
  no_log: true

- name: Apply schema to Cloud SQL PostgreSQL
  command: >-
    docker run --rm
    -e PGPASSWORD
    -v /opt/cognitor/history:/work:ro
    postgres:16-alpine
    psql -v ON_ERROR_STOP=1
    -h {{ cloud_sql_private_ip }}
    -U {{ db_user }}
    -d {{ db_name }}
    -f /work/schema.sql
  environment:
    PGPASSWORD: "{{ db_password }}"
  changed_when: false
  when: database_backend == 'cloudsql'
  no_log: true

- name: Run Docker Compose
  command: docker compose -f /opt/cognitor/history/compose.yaml up -d --force-recreate --remove-orphans
  args:
    chdir: /opt/cognitor/history
  environment: "{{ history_compose_environment }}"
  no_log: true

- name: Wait for history-api health endpoint
  uri:
    url: "http://localhost:{{ history_port }}/health"
    method: GET
    status_code: 200
  retries: 12
  delay: 5
  register: result
  until: result.status == 200

- name: Remove dangling Docker images
  command: docker image prune -f
  changed_when: false
