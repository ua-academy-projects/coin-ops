---
- name: Stop and disable legacy host services
  service:
    name: "{{ item }}"
    state: stopped
    enabled: no
  loop:
    - postgresql
    - rabbitmq-server
    - cognitor-history-consumer
    - cognitor-history-api
  failed_when: false

- name: Create secrets directory
  file:
    path: /etc/cognitor
    state: directory
    owner: root
    group: root
    mode: '0750'

- name: Write history environment file
  template:
    src: history.env.j2
    dest: /etc/cognitor/history.env
    owner: root
    group: root
    mode: '0640'

- name: Create history deploy directory
  file:
    path: /opt/cognitor/history
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Sync history source files
  synchronize:
    src: "{{ playbook_dir }}/../history/"
    dest: /opt/cognitor/history/history/
    delete: yes

- name: Sync compose file
  copy:
    src: "{{ playbook_dir }}/../deploy/compose/node-01.compose.yaml"
    dest: /opt/cognitor/history/compose.yaml

- name: Run Docker Compose
  command: docker compose -f /opt/cognitor/history/compose.yaml up -d --build --remove-orphans
  args:
    chdir: /opt/cognitor/history

- name: Wait for history-api health endpoint
  uri:
    url: "http://localhost:8000/health"
    method: GET
    status_code: 200
  retries: 12
  delay: 5
  register: result
  until: result.status == 200
