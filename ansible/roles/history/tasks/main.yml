---
- name: Check for existing containerized PostgreSQL data
  stat:
    path: /var/lib/coin-ops/postgres/PG_VERSION
  register: container_postgres_pg_version

- name: Check for completed host PostgreSQL migration
  stat:
    path: /var/lib/coin-ops/postgres/.migrated-from-host
  register: host_postgres_migration_marker

- name: Check for legacy host PostgreSQL data
  shell: "find /var/lib/postgresql -mindepth 3 -maxdepth 3 -name PG_VERSION -print -quit 2>/dev/null"
  register: legacy_postgres_pg_version
  changed_when: false
  failed_when: false

- name: Create migration backup directory
  file:
    path: /var/backups/coin-ops
    state: directory
    owner: postgres
    group: postgres
    mode: '0750'
  when:
    - legacy_postgres_pg_version.stdout != ''
    - not container_postgres_pg_version.stat.exists
    - not host_postgres_migration_marker.stat.exists

- name: Ensure legacy PostgreSQL is running for one-time dump
  service:
    name: postgresql
    state: started
  when:
    - legacy_postgres_pg_version.stdout != ''
    - not container_postgres_pg_version.stat.exists
    - not host_postgres_migration_marker.stat.exists
  failed_when: false

- name: Dump legacy application database before container cutover
  become_user: postgres
  command: "pg_dump --clean --if-exists --no-owner --no-acl -d {{ db_name }} -f /var/backups/coin-ops/pre-container-postgres.sql"
  when:
    - legacy_postgres_pg_version.stdout != ''
    - not container_postgres_pg_version.stat.exists
    - not host_postgres_migration_marker.stat.exists

- name: Stop and disable legacy host services
  service:
    name: "{{ item }}"
    state: stopped
    enabled: no
  loop:
    - postgresql
    - rabbitmq-server
    - cognitor-history-consumer
    - cognitor-history-api
  failed_when: false

- name: Create secrets directory
  file:
    path: /etc/cognitor
    state: directory
    owner: root
    group: root
    mode: '0750'

- name: Write history environment file
  template:
    src: history.env.j2
    dest: /etc/cognitor/history.env
    owner: root
    group: root
    mode: '0640'

- name: Create history deploy directory
  file:
    path: /opt/cognitor/history
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Remove legacy synced history source
  file:
    path: /opt/cognitor/history/history
    state: absent

- name: Copy PostgreSQL runtime schema
  copy:
    src: "{{ playbook_dir }}/../history/schema.sql"
    dest: /opt/cognitor/history/schema.sql
    owner: root
    group: root
    mode: '0644'

- name: Copy runtime SQL schema files
  copy:
    src: "{{ playbook_dir }}/../runtime/"
    dest: /opt/cognitor/history/runtime/
    owner: root
    group: root
    mode: '0644'

- name: Render compose file
  template:
    src: "{{ playbook_dir }}/../deploy/compose/node-01.compose.yaml"
    dest: /opt/cognitor/history/compose.yaml

- name: Validate history compose configuration
  command: docker compose -f /opt/cognitor/history/compose.yaml config -q
  args:
    chdir: /opt/cognitor/history
  changed_when: false

- name: Stop PostgreSQL before repairing data directory ownership
  command: docker compose -f /opt/cognitor/history/compose.yaml stop postgres
  args:
    chdir: /opt/cognitor/history
  changed_when: false
  failed_when: false

- name: Repair PostgreSQL data directory ownership for selected Postgres image
  file:
    path: /var/lib/coin-ops/postgres
    state: directory
    # Keep the runtime image on Alpine-compatible uid/gid 70 so existing
    # postgres volumes can be reused during external -> postgres cutover.
    owner: '70'
    group: '70'
    mode: '0700'
    recurse: yes

- name: Pull history container images
  command: docker compose -f /opt/cognitor/history/compose.yaml pull
  args:
    chdir: /opt/cognitor/history

- name: Start history dependencies first
  command: >-
    docker compose -f /opt/cognitor/history/compose.yaml up -d
    postgres{% if runtime_backend == "external" %} rabbitmq{% endif %}
  args:
    chdir: /opt/cognitor/history

- name: Wait for containerized PostgreSQL readiness
  command: "docker compose -f /opt/cognitor/history/compose.yaml exec -T postgres pg_isready -U {{ db_user }} -d {{ db_name }}"
  args:
    chdir: /opt/cognitor/history
  retries: 12
  delay: 5
  register: postgres_ready
  until: postgres_ready.rc == 0

- name: Check for legacy dump file
  stat:
    path: /var/backups/coin-ops/pre-container-postgres.sql
  register: legacy_postgres_dump

- name: Restore legacy PostgreSQL dump into container
  shell: "docker compose -f /opt/cognitor/history/compose.yaml exec -T postgres psql -U {{ db_user }} -d {{ db_name }} < /var/backups/coin-ops/pre-container-postgres.sql"
  args:
    chdir: /opt/cognitor/history
  when:
    - legacy_postgres_dump.stat.exists
    - not host_postgres_migration_marker.stat.exists

- name: Apply PostgreSQL runtime schema before app startup
  shell: >-
    docker compose -f /opt/cognitor/history/compose.yaml exec -T postgres
    psql -v ON_ERROR_STOP=1 -U {{ db_user }} -d {{ db_name }}
    < /opt/cognitor/history/schema.sql
  args:
    chdir: /opt/cognitor/history
  register: schema_result
  changed_when: false

- name: Persist runtime application role before wrapper bootstrap
  command: >-
    docker compose -f /opt/cognitor/history/compose.yaml exec -T postgres
    psql -v ON_ERROR_STOP=1 -U {{ db_user }} -d {{ db_name }}
    -c "ALTER DATABASE {{ db_name }} SET runtime.app_role = '{{ db_user }}';"
  args:
    chdir: /opt/cognitor/history
  register: runtime_app_role_result
  changed_when: false
  when: runtime_backend == "postgres"

- name: Apply runtime queue and session schema
  shell: |
    (
      printf "%s\n" "SET runtime.app_role = '{{ db_user }}';"
      cat \
        /opt/cognitor/history/runtime/01_schema.sql \
        /opt/cognitor/history/runtime/02_wrappers.sql \
        /opt/cognitor/history/runtime/03_notify.sql \
        /opt/cognitor/history/runtime/04_advisory.sql \
        /opt/cognitor/history/runtime/05_dlq.sql \
        /opt/cognitor/history/runtime/06_cache_schema.sql \
        /opt/cognitor/history/runtime/07_cache_wrappers.sql \
        /opt/cognitor/history/runtime/08_cron.sql
    ) | docker compose -f /opt/cognitor/history/compose.yaml exec -T postgres psql -v ON_ERROR_STOP=1 -U {{ db_user }} -d {{ db_name }}
  args:
    chdir: /opt/cognitor/history
  register: runtime_schema_result
  changed_when: false
  when: runtime_backend == "postgres"

- name: Verify PostgreSQL runtime extensions are installed
  command: >-
    docker compose -f /opt/cognitor/history/compose.yaml exec -T postgres
    psql -v ON_ERROR_STOP=1 -At -U {{ db_user }} -d {{ db_name }}
    -c "SELECT string_agg(extname, ',' ORDER BY extname) FROM pg_extension WHERE extname IN ('pg_cron', 'pgmq');"
  args:
    chdir: /opt/cognitor/history
  register: runtime_extension_check
  changed_when: false
  failed_when: runtime_extension_check.stdout | trim != "pg_cron,pgmq"
  when: runtime_backend == "postgres"

- name: Verify PostgreSQL runtime cron jobs are registered
  command: >-
    docker compose -f /opt/cognitor/history/compose.yaml exec -T postgres
    psql -v ON_ERROR_STOP=1 -At -U {{ db_user }} -d {{ db_name }}
    -c "SELECT count(*) FROM cron.job WHERE jobname IN ('runtime-cache-reap', 'runtime-session-reap', 'runtime-dlq-reap') AND active;"
  args:
    chdir: /opt/cognitor/history
  register: runtime_cron_check
  changed_when: false
  failed_when: runtime_cron_check.stdout | trim | int != 3
  when: runtime_backend == "postgres"

- name: Mark legacy PostgreSQL migration complete
  file:
    path: /var/lib/coin-ops/postgres/.migrated-from-host
    state: touch
    mode: '0644'
  when:
    - legacy_postgres_dump.stat.exists
    - not host_postgres_migration_marker.stat.exists

- name: Run Docker Compose
  command: docker compose -f /opt/cognitor/history/compose.yaml up -d --remove-orphans
  args:
    chdir: /opt/cognitor/history

- name: Wait for history-api health endpoint
  uri:
    url: "http://localhost:{{ history_port }}/health"
    method: GET
    status_code: 200
  retries: 12
  delay: 5
  register: result
  until: result.status == 200

- name: Remove dangling Docker images
  command: docker image prune -f
  changed_when: false
