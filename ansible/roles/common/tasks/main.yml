---
- name: Set stable system hostname from cloud and instance key
  hostname:
    name: "{{ my_cloud }}-{{ infra_instance_key }}"

- name: Check whether ufw is installed
  stat:
    path: /usr/sbin/ufw
  register: ufw_binary

- name: Determine whether this host forwards traffic
  set_fact:
    common_is_forwarder: "{{ host_instance_config.get('can_ip_forward', false) | bool }}"

- name: Prepare non-image-based hosts
  when: not host_uses_golden_image
  block:
    - name: Check whether cloud-init is installed
      stat:
        path: /usr/bin/cloud-init
      register: cloud_init_binary

    - name: Wait for cloud-init to finish first boot work
      command: cloud-init status --wait
      when:
        - provisioning_wait_for_cloud_init | default(true) | bool
        - cloud_init_binary.stat.exists
      changed_when: false

    - name: Wait for apt and dpkg background jobs to finish
      shell: |
        set -euo pipefail
        timeout_seconds={{ provisioning_apt_lock_timeout | default(900) | int }}
        elapsed=0

        while ps -eo comm= | grep -Eq '^(apt|apt-get|dpkg|unattended-upgrade)$'; do
          if [ "$elapsed" -ge "$timeout_seconds" ]; then
            echo "Timed out waiting for apt/dpkg background jobs to finish" >&2
            exit 1
          fi
          sleep 5
          elapsed=$((elapsed + 5))
        done
      args:
        executable: /bin/bash
      changed_when: false

    - name: Normalize Docker APT sources before refreshing apt
      shell: |
        set -euo pipefail
        shopt -s nullglob

        canonical_repo="deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/{{ ansible_distribution | lower }} {{ ansible_distribution_release }} stable"

        if [ -f /etc/apt/sources.list.d/docker.list ]; then
          if ! grep -Fxq "$canonical_repo" /etc/apt/sources.list.d/docker.list; then
            rm -f /etc/apt/sources.list.d/docker.list
          fi
        fi

        for file in /etc/apt/sources.list.d/*.list; do
          if [ "$(basename "$file")" != "docker.list" ] && grep -q "download.docker.com/linux/{{ ansible_distribution | lower }}" "$file"; then
            rm -f "$file"
          fi
        done

        if [ -f /etc/apt/sources.list ]; then
          sed -i '\|download.docker.com/linux/{{ ansible_distribution | lower }}|d' /etc/apt/sources.list
        fi
      args:
        executable: /bin/bash
      changed_when: false

    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
        lock_timeout: "{{ provisioning_apt_lock_timeout | default(900) }}"

    - name: Upgrade all packages
      apt:
        upgrade: safe
        lock_timeout: "{{ provisioning_apt_lock_timeout | default(900) }}"
      when: provisioning_upgrade_packages | default(false) | bool

    - name: Install base packages
      apt:
        name:
          - curl
          - htop
          - jq
          - acl
          - unattended-upgrades
        state: present
        lock_timeout: "{{ provisioning_apt_lock_timeout | default(900) }}"

    - name: Set timezone to UTC
      timezone:
        name: UTC

    - name: Collect service facts for time sync selection
      service_facts:

    - name: Select available time sync service
      set_fact:
        common_time_sync_service: >-
          {{
            'systemd-timesyncd'
            if 'systemd-timesyncd.service' in ansible_facts.services
            else (
              'chrony'
              if 'chrony.service' in ansible_facts.services
              else (
                'chronyd'
                if 'chronyd.service' in ansible_facts.services
                else ''
              )
            )
          }}

    - name: Ensure available time sync service is running
      systemd:
        name: "{{ common_time_sync_service }}"
        enabled: yes
        state: started
      when: common_time_sync_service != ''

    - name: Assert a supported time sync service is present
      assert:
        that:
          - common_time_sync_service != ''
        fail_msg: >-
          No supported time sync service was found. Expected one of:
          systemd-timesyncd, chrony, or chronyd.

    - name: Install UFW
      apt:
        name: ufw
        state: present
        lock_timeout: "{{ provisioning_apt_lock_timeout | default(900) }}"
      when: not common_is_forwarder

- name: Disable UFW on traffic-forwarding hosts to avoid interfering with forwarded traffic
  community.general.ufw:
    state: disabled
  when:
    - common_is_forwarder
    - ufw_binary.stat.exists

- name: Validate baked common host tooling on golden-image hosts
  when: host_uses_golden_image
  block:
    - name: Check expected common binaries from the golden image
      shell: |
        set -euo pipefail
        for binary in curl htop jq ufw; do
          command -v "$binary" >/dev/null
        done
      args:
        executable: /bin/bash
      changed_when: false

    - name: Verify host timezone remains UTC
      command: timedatectl show --property=Timezone --value
      register: timezone_check
      changed_when: false

    - name: Assert golden-image timezone contract
      assert:
        that:
          - timezone_check.stdout == 'UTC'
        fail_msg: "Golden-image app hosts must keep the baked UTC timezone."

    - name: Collect service facts on golden-image hosts
      service_facts:

    - name: Select available time sync service on golden-image hosts
      set_fact:
        common_time_sync_service: >-
          {{
            'systemd-timesyncd'
            if 'systemd-timesyncd.service' in ansible_facts.services
            else (
              'chrony'
              if 'chrony.service' in ansible_facts.services
              else (
                'chronyd'
                if 'chronyd.service' in ansible_facts.services
                else ''
              )
            )
          }}

    - name: Assert selected time sync service is available and running
      assert:
        that:
          - common_time_sync_service != ''
          - ansible_facts.services[common_time_sync_service ~ '.service'].state == 'running'
        fail_msg: "Golden-image app hosts must keep a supported time sync service running."

- name: Set UFW default deny incoming
  community.general.ufw:
    direction: incoming
    policy: deny
  notify: Reload UFW
  when: not common_is_forwarder

- name: Set UFW default allow outgoing
  community.general.ufw:
    direction: outgoing
    policy: allow
  notify: Reload UFW
  when: not common_is_forwarder

- name: Allow configured ports through UFW
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: "{{ common_allowed_ports }}"
  notify: Reload UFW
  when: not common_is_forwarder

- name: Enable UFW
  community.general.ufw:
    state: enabled
  when: not common_is_forwarder

- name: Reset SSH connection after host firewall changes
  meta: reset_connection
  when: not common_is_forwarder
