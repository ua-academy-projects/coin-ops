- name: update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
    
- name: install common packages
  ansible.builtin.apt:
    name:
      - curl
      - git
    state: present

- name: set timezone for vms
  become: true
  ansible.builtin.command: timedatectl set-timezone Europe/Kyiv