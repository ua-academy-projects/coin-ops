---
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Upgrade all packages
  apt:
    upgrade: safe

- name: Install base packages
  apt:
    name:
      - curl
      - htop
      - jq
      - acl
      - systemd-timesyncd
      - unattended-upgrades
    state: present

- name: Set timezone to UTC
  timezone:
    name: UTC

- name: Ensure systemd-timesyncd is running
  systemd:
    name: systemd-timesyncd
    enabled: yes
    state: started

- name: Install and configure UFW
  when: common_manage_ufw | default(true) | bool
  block:
    - name: Install UFW
      apt:
        name: ufw
        state: present

    - name: Set UFW default deny incoming
      community.general.ufw:
        direction: incoming
        policy: deny
      notify: Reload UFW

    - name: Set UFW default allow outgoing
      community.general.ufw:
        direction: outgoing
        policy: allow
      notify: Reload UFW

    - name: Allow configured ports through UFW
      community.general.ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop: "{{ common_allowed_ports }}"
      notify: Reload UFW

    - name: Check UFW status
      command: ufw status
      register: ufw_status
      changed_when: false

    - name: Enable UFW without waiting on the SSH control connection
      command: ufw --force enable
      async: 30
      poll: 0
      when: "'Status: active' not in ufw_status.stdout"

    - name: Reset SSH connection after UFW changes
      meta: reset_connection

    - name: Wait for SSH after UFW changes
      wait_for_connection:
        timeout: 60
