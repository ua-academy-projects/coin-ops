- name: install ui packages
  ansible.builtin.apt:
    name:
      - python3
      - python3-flask
      - python3-flask-session
      - python3-redis
      - python3-requests


    state: present
    update_cache: true  # apt update

- name: install ui systemd unit
  become: true
  ansible.builtin.template:
    src: ui.service.j2
    dest: /etc/systemd/system/ui.service
    
 
  notify: reload systemd
- meta: flush_handlers
- name: enable and start ui service
  become: true
  ansible.builtin.systemd:
    name: ui
    enabled: true
    state: restarted
