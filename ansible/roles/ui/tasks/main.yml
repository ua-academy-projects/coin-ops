---
- name: Stop and disable legacy host nginx
  service:
    name: nginx
    state: stopped
    enabled: no
  failed_when: false

- name: Create secrets directory
  file:
    path: /etc/cognitor
    state: directory
    owner: root
    group: root
    mode: '0750'

- name: Write ui environment file (if any required in future)
  copy:
    content: "DUMMY=var\n"
    dest: /etc/cognitor/ui.env
    owner: root
    group: root
    mode: '0640'

- name: Create ui deploy directory
  file:
    path: /opt/cognitor/ui
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Sync ui source files
  synchronize:
    src: "{{ playbook_dir }}/../ui-react/"
    dest: /opt/cognitor/ui/ui-react/
    delete: yes
    rsync_opts:
      - "--exclude=node_modules"

- name: Sync compose file
  copy:
    src: "{{ playbook_dir }}/../deploy/compose/node-03.compose.yaml"
    dest: /opt/cognitor/ui/compose.yaml

- name: Run Docker Compose
  command: docker compose -f /opt/cognitor/ui/compose.yaml up -d --build --remove-orphans
  args:
    chdir: /opt/cognitor/ui

- name: Wait for nginx availability
  uri:
    url: "http://localhost:80/health"
    method: GET
    status_code: 200
  retries: 12
  delay: 5
  register: result
  until: result.status == 200
