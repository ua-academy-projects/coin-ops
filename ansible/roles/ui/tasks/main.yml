---
- name: Stop and disable legacy host nginx
  service:
    name: nginx
    state: stopped
    enabled: no
  failed_when: false

- name: Validate TLS mode
  assert:
    that:
      - tls_mode in ['selfsigned', 'provided', 'certbot']
    fail_msg: "TLS_MODE must be one of: selfsigned, provided, certbot."

- name: Validate Cloudflare secret availability for Certbot
  assert:
    that:
      - cloudflare_api_token | length > 0
    fail_msg: "CLOUDFLARE_API_TOKEN must be present in GCP Secret Manager secret coinops-app-secrets when TLS_MODE=certbot."
  when: tls_mode == 'certbot'

- name: Create shared secrets directory
  file:
    path: /etc/cognitor
    state: directory
    owner: root
    group: root
    mode: '0750'

- name: Remove HTTP (Port 80) from UFW
  community.general.ufw:
    rule: allow
    port: "80"
    proto: tcp
    delete: yes
  failed_when: false
  notify: Reload UFW

- name: Allow HTTPS in UFW
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - "443"
  notify: Reload UFW

- name: Check if certificate already exists
  stat:
    path: "/etc/letsencrypt/live/{{ app_domain }}/fullchain.pem"
  register: cert_file
  when: tls_mode == 'certbot'

- name: Ensure cloudflare.ini is not a directory (Docker workaround)
  file:
    path: /etc/cognitor/cloudflare.ini
    state: absent
  when: tls_mode == 'certbot' and not cert_file.stat.exists
  ignore_errors: yes

- name: Write Cloudflare credentials for Certbot
  copy:
    content: |
      dns_cloudflare_api_token = {{ cloudflare_api_token }}
    dest: /etc/cognitor/cloudflare.ini
    owner: root
    group: root
    mode: '0600'
  when: tls_mode == 'certbot' and not cert_file.stat.exists

- name: Request Let's Encrypt certificate (Initial - DNS)
  command: >
    docker run --rm
    -v "/etc/letsencrypt:/etc/letsencrypt"
    -v "/var/lib/letsencrypt:/var/lib/letsencrypt"
    -v "/etc/cognitor/cloudflare.ini:/cloudflare.ini:ro"
    certbot/dns-cloudflare certonly
    --dns-cloudflare
    --dns-cloudflare-credentials /cloudflare.ini
    --dns-cloudflare-propagation-seconds 20
    -d {{ app_domain }}
    --email {{ certbot_email }}
    {{ '--test-cert' if certbot_staging else '' }}
    --agree-tos --non-interactive
  when: tls_mode == 'certbot' and not cert_file.stat.exists

- name: Create secrets directory
  file:
    path: "{{ tls_cert_dir }}"
    state: directory
    mode: '0755'

- name: Setup auto-renewal via systemd timer
  copy:
    content: |
      [Unit]
      Description=Certbot Auto Renewal

      [Service]
      Type=oneshot
      ExecStart=/usr/bin/docker run --rm -v "/etc/letsencrypt:/etc/letsencrypt" -v "/var/lib/letsencrypt:/var/lib/letsencrypt" -v "/etc/cognitor/cloudflare.ini:/cloudflare.ini:ro" certbot/dns-cloudflare renew {% if certbot_staging %}--test-cert {% endif %}
      ExecPost=/usr/bin/docker compose -f /opt/cognitor/ui/compose.yaml restart ui
    dest: /etc/systemd/system/certbot-renewal.service
  when: tls_mode == 'certbot'

- name: Setup auto-renewal timer
  copy:
    content: |
      [Unit]
      Description=Timer for Certbot Renewal

      [Timer]
      OnCalendar=*-*-* 03:00:00
      Persistent=true

      [Install]
      WantedBy=timers.target
    dest: /etc/systemd/system/certbot-renewal.timer
  when: tls_mode == 'certbot'

- name: Enable auto-renewal timer
  systemd:
    name: certbot-renewal.timer
    enabled: yes
    state: started
    daemon_reload: yes
  when: tls_mode == 'certbot'

- name: Install local TLS tooling
  apt:
    name: openssl
    state: present
    update_cache: yes
  when: tls_mode == 'selfsigned'

- name: Inspect existing self-signed certificate SAN
  command: "openssl x509 -in {{ tls_cert_path }} -noout -ext subjectAltName"
  register: selfsigned_cert_san
  changed_when: false
  failed_when: false
  when: tls_mode == 'selfsigned'

- name: Remove stale self-signed certificate after domain change
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ tls_cert_path }}"
    - "{{ tls_key_path }}"
  when:
    - tls_mode == 'selfsigned'
    - selfsigned_cert_san.rc == 0
    - ("DNS:" ~ app_domain) not in selfsigned_cert_san.stdout

- name: Generate self-signed gateway certificate
  command:
    cmd: >-
      openssl req -x509 -nodes -newkey rsa:2048
      -keyout {{ tls_key_path }}
      -out {{ tls_cert_path }}
      -days 365
      -subj /CN={{ app_domain }}
      -addext subjectAltName=DNS:{{ app_domain }}
    creates: "{{ tls_cert_path }}"
  when: tls_mode == 'selfsigned'

- name: Restrict self-signed gateway private key
  file:
    path: "{{ tls_key_path }}"
    owner: root
    group: root
    mode: '0600'
  when: tls_mode == 'selfsigned'

- name: Check provided TLS certificate
  stat:
    path: "{{ tls_cert_path }}"
  register: provided_tls_cert
  when: tls_mode == 'provided'

- name: Check provided TLS private key
  stat:
    path: "{{ tls_key_path }}"
  register: provided_tls_key
  when: tls_mode == 'provided'

- name: Validate provided TLS files
  assert:
    that:
      - provided_tls_cert.stat.exists
      - provided_tls_key.stat.exists
    fail_msg: "TLS_MODE=provided requires {{ tls_cert_path }} and {{ tls_key_path }} on the UI node."
  when: tls_mode == 'provided'

- name: Create ui deploy directory
  file:
    path: /opt/cognitor/ui
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Remove legacy synced ui source
  file:
    path: /opt/cognitor/ui/ui-react
    state: absent

- name: Render nginx gateway config
  template:
    src: nginx.gateway.conf.j2
    dest: /opt/cognitor/ui/nginx.conf
    owner: root
    group: root
    mode: '0644'
  register: nginx_config

- name: Render compose file
  template:
    src: "{{ playbook_dir }}/../deploy/compose/node-03.compose.yaml"
    dest: /opt/cognitor/ui/compose.yaml
  register: ui_compose

- name: Restart UI container if config changed
  command: docker compose -f /opt/cognitor/ui/compose.yaml restart ui
  args:
    chdir: /opt/cognitor/ui
  when: nginx_config.changed or ui_compose.changed
  failed_when: false

- name: Pull ui container images
  command: docker compose -f /opt/cognitor/ui/compose.yaml pull
  args:
    chdir: /opt/cognitor/ui

- name: Run Docker Compose
  command: docker compose -f /opt/cognitor/ui/compose.yaml up -d --remove-orphans
  args:
    chdir: /opt/cognitor/ui

- name: Wait for nginx availability
  uri:
    url: "https://localhost/health"
    method: GET
    status_code: 200
    validate_certs: no
  retries: 12
  delay: 5
  register: result
  until: result.status == 200

- name: Remove dangling Docker images
  command: docker image prune -f
  changed_when: false
