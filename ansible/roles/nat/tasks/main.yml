---
- name: Install NAT packages
  apt:
    name:
      - iptables-persistent
      - netfilter-persistent
    state: present
    update_cache: yes
  environment:
    DEBIAN_FRONTEND: noninteractive

- name: Persist IPv4 forwarding configuration
  copy:
    content: |
      net.ipv4.ip_forward=1
    dest: /etc/sysctl.d/99-coinops-nat.conf
    owner: root
    group: root
    mode: '0644'
  register: nat_sysctl_config

- name: Apply IPv4 forwarding configuration
  command: sysctl -p /etc/sysctl.d/99-coinops-nat.conf
  when: nat_sysctl_config.changed
  changed_when: true

- name: Enable IPv4 forwarding immediately
  command: sysctl -w net.ipv4.ip_forward=1
  changed_when: false

- name: Ensure NAT masquerade rule exists
  iptables:
    table: nat
    chain: POSTROUTING
    source: "{{ nat_private_cidr }}"
    out_interface: "{{ ansible_facts['default_ipv4']['interface'] }}"
    jump: MASQUERADE
    comment: CoinOps NAT masquerade
    state: present

- name: Allow private subnet traffic to be forwarded out
  iptables:
    chain: FORWARD
    source: "{{ nat_private_cidr }}"
    out_interface: "{{ ansible_facts['default_ipv4']['interface'] }}"
    jump: ACCEPT
    comment: CoinOps NAT forward outbound
    state: present

- name: Allow established traffic back to the private subnet
  iptables:
    chain: FORWARD
    destination: "{{ nat_private_cidr }}"
    in_interface: "{{ ansible_facts['default_ipv4']['interface'] }}"
    ctstate:
      - ESTABLISHED
      - RELATED
    jump: ACCEPT
    comment: CoinOps NAT forward return
    state: present

- name: Save iptables rules
  command: netfilter-persistent save
  changed_when: true

- name: Enable netfilter-persistent service
  systemd:
    name: netfilter-persistent
    enabled: yes
    state: started
