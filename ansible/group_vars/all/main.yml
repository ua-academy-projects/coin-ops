# All variables — safe to commit.
# Secrets and local paths come from environment variables.
# Run `source .env` before any ansible-playbook command.

# ── SSH ───────────────────────────────────────────────────────
ansible_user: vagrant
ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
ansible_ssh_private_key_file: "{{ lookup('env', 'SSH_KEY_PATH') | expanduser }}"

# ── Passwords (loaded from .env) ──────────────────────────────
rabbitmq_password: "{{ lookup('env', 'RABBITMQ_PASSWORD') }}"
db_password: "{{ lookup('env', 'DB_PASSWORD') }}"

# ── Service accounts ──────────────────────────────────────────
rabbitmq_user: cognitor
db_name: cognitor
db_user: cognitor

# ── Ports ────────────────────────────────────────────────────
proxy_port: 8080
history_port: 8000

# ── Container images ─────────────────────────────────────────
# GitHub Actions publishes these images to GHCR.
# Override IMAGE_TAG for immutable deploys, for example:
#   IMAGE_TAG=<commit-sha> ansible-playbook -i ansible/inventory ansible/deploy.yml
image_registry: "{{ lookup('env', 'IMAGE_REGISTRY') | default('ghcr.io/ua-academy-projects', true) }}"
image_registry_host: "{{ image_registry.split('/')[0] }}"
image_tag: "{{ lookup('env', 'IMAGE_TAG') | default('shabat-latest', true) }}"
proxy_image: "{{ image_registry }}/coin-ops-proxy:{{ image_tag }}"
history_api_image: "{{ image_registry }}/coin-ops-history-api:{{ image_tag }}"
history_consumer_image: "{{ image_registry }}/coin-ops-history-consumer:{{ image_tag }}"
ui_image: "{{ image_registry }}/coin-ops-ui:{{ image_tag }}"
registry_username: "{{ lookup('env', 'GHCR_USERNAME') | default('', true) }}"
registry_token: "{{ lookup('env', 'GHCR_TOKEN') | default('', true) }}"

# ── Derived connection strings ────────────────────────────────
rabbitmq_url: "amqp://{{ rabbitmq_user }}:{{ rabbitmq_password }}@172.31.1.10:5672/"
database_url: "postgresql://{{ db_user }}:{{ db_password }}@localhost:5432/{{ db_name }}"
redis_url: "redis://127.0.0.1:6379/0"
