# All variables — safe to commit.
# Local paths come from environment variables.
# Run `source .env` before any ansible-playbook command.

# ── SSH ───────────────────────────────────────────────────────
ansible_user: deployer 
# ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
ansible_ssh_private_key_file: "{{ lookup('env', 'SSH_KEY_PATH') | expanduser }}"
ansible_ssh_common_args: >-
  -o StrictHostKeyChecking=no
  -o ForwardAgent=yes
  -o ProxyJump={{ ansible_user }}@{{ hostvars['coinops-bastion'].ansible_host }}

# ── GCP / Secret Manager ───────────────────────────────────────
google_project: "{{ lookup('env', 'GOOGLE_PROJECT') | default('', true) }}"
gsm_secret_ids:
  ghcr_username: ghcr-username
  ghcr_token: ghcr-token
  rabbitmq_password: rabbitmq-password
  db_password: db-password

# ── Passwords / tokens ─────────────────────────────────────────
rabbitmq_password: "{{ fetched_gsm_secrets.rabbitmq_password | default(lookup('env', 'RABBITMQ_PASSWORD'), true) }}"
db_password: "{{ fetched_gsm_secrets.db_password | default(lookup('env', 'DB_PASSWORD'), true) }}"

# ── Service accounts ──────────────────────────────────────────
rabbitmq_user: cognitor
db_name: cognitor
db_user: cognitor
runtime_backend: "{{ lookup('env', 'RUNTIME_BACKEND') | default('external', true) }}"

# ── Ports ────────────────────────────────────────────────────
proxy_port: 8080
history_port: 8000
postgres_bind_ip: "{{ hostvars[groups['history'][0]].private_ip }}"
# postgres_bind_ip: 0.0.0.0
# postgres_bind_ip: "{{ hostvars[groups['history'][0]].ansible_host }}"

# Public entrypoint / TLS
# Browser-facing domain served by node-03. For local labs, add this to hosts:
#   172.31.1.12 coinops.test
app_domain: "{{ lookup('env', 'APP_DOMAIN') | default('coinops.test', true) }}"

# Supported modes:
#   selfsigned - Ansible creates a local self-signed cert on node-03
#   provided   - cert/key already exist on node-03 under /etc/cognitor/tls
#   letsencrypt - Ansible obtains/renews a Let's Encrypt cert on node-03
#   off        - HTTP only, useful for quick internal debugging
tls_mode: "{{ lookup('env', 'TLS_MODE') | default('selfsigned', true) }}"
tls_enabled: "{{ tls_mode != 'off' }}"
tls_cert_dir: /etc/cognitor/tls
tls_cert_path: "{{ tls_cert_dir }}/coinops.crt"
tls_key_path: "{{ tls_cert_dir }}/coinops.key"
tls_acme_webroot: /var/lib/letsencrypt
tls_letsencrypt_email: "{{ lookup('env', 'LETSENCRYPT_EMAIL') | default('', true) }}"

# ── Container images ─────────────────────────────────────────
# GitHub Actions publishes these images to GHCR.
# Override IMAGE_TAG for immutable deploys, for example:
#   IMAGE_TAG=<commit-sha> ansible-playbook -i ansible/inventory ansible/deploy.yml
image_registry: "{{ lookup('env', 'IMAGE_REGISTRY') | default('ghcr.io/ua-academy-projects', true) }}"
image_registry_host: "{{ image_registry.split('/')[0] }}"
image_tag: "{{ lookup('env', 'IMAGE_TAG') | default('shabat-latest', true) }}"
proxy_image: "{{ image_registry }}/coin-ops-proxy:{{ image_tag }}"
history_api_image: "{{ image_registry }}/coin-ops-history-api:{{ image_tag }}"
history_consumer_image: "{{ image_registry }}/coin-ops-history-consumer:{{ image_tag }}"
ui_image: "{{ image_registry }}/coin-ops-ui:{{ image_tag }}"
postgres_runtime_image: "{{ image_registry }}/coin-ops-postgres-runtime:{{ image_tag }}"
postgres_image: "{{ postgres_runtime_image if runtime_backend == 'postgres' else 'postgres:16-alpine' }}"
registry_username: "{{ fetched_gsm_secrets.ghcr_username | default(lookup('env', 'GHCR_USERNAME'), true) }}"
registry_token: "{{ fetched_gsm_secrets.ghcr_token | default(lookup('env', 'GHCR_TOKEN'), true) }}"

# ── Derived connection strings ────────────────────────────────
# rabbitmq_url: "amqp://{{ rabbitmq_user }}:{{ rabbitmq_password }}@{{ hostvars[groups['history'][0]].ansible_host }}:5672/"
rabbitmq_url: "amqp://{{ rabbitmq_user }}:{{ rabbitmq_password }}@{{ hostvars[groups['history'][0]].private_ip }}:5672/"
# POSTGRES ->
# defines DATABASE_URL
database_url: "postgresql://{{ db_user }}:{{ db_password }}@localhost:5432/{{ db_name }}"
history_database_url: "postgresql://{{ db_user }}:{{ db_password }}@postgres:5432/{{ db_name }}"
proxy_database_url: "postgresql://{{ db_user }}:{{ db_password }}@{{ hostvars[groups['history'][0]].private_ip }}:5432/{{ db_name }}"
# proxy_database_url: "postgresql://{{ db_user }}:{{ db_password }}@{{ postgres_bind_ip }}:5432/{{ db_name }}"
redis_url: "redis://127.0.0.1:6379/0"
