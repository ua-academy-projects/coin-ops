# All variables are safe to commit.
# Secrets and local paths come from environment variables.
# Cloud generated inventory may set coinops_* variables.

# SSH
ansible_user: "{{ coinops_ansible_user | default('vagrant', true) }}"
ansible_ssh_private_key_file: "{{ (coinops_ssh_private_key_file | default(lookup('env', 'SSH_KEY_PATH'), true)) | expanduser }}"
ansible_ssh_common_args: "{{ coinops_ssh_common_args | default('-o StrictHostKeyChecking=no', true) }}"

# Passwords
rabbitmq_password: "{{ lookup('env', 'RABBITMQ_PASSWORD') }}"
db_password: "{{ lookup('env', 'DB_PASSWORD') }}"

# Service accounts
rabbitmq_user: cognitor
db_name: cognitor
db_user: cognitor
runtime_backend: "{{ lookup('env', 'RUNTIME_BACKEND') | default('external', true) }}"

# Ports
proxy_port: 8080
history_port: 8000
cloud_db_host: "{{ coinops_db_host | default((hostvars[groups['db'][0]].ansible_host if 'db' in groups else hostvars[groups['history'][0]].ansible_host), true) }}"
postgres_bind_ip: "{{ cloud_db_host }}"

# Public entrypoint / TLS
app_domain: "{{ coinops_app_domain | default(lookup('env', 'APP_DOMAIN') | default('coinops.test', true), true) }}"
app_url: "{{ coinops_app_url | default('', true) }}"
tls_mode: "{{ coinops_tls_mode | default(lookup('env', 'TLS_MODE') | default('selfsigned', true), true) }}"
tls_enabled: "{{ tls_mode != 'off' }}"
tls_cert_dir: /etc/cognitor/tls
tls_cert_path: "{{ tls_cert_dir }}/coinops.crt"
tls_key_path: "{{ tls_cert_dir }}/coinops.key"

# Container images
image_registry: "{{ lookup('env', 'IMAGE_REGISTRY') | default('ghcr.io/ua-academy-projects', true) }}"
image_registry_host: "{{ image_registry.split('/')[0] }}"
image_tag: "{{ lookup('env', 'IMAGE_TAG') | default('dev-latest', true) }}"
proxy_image: "{{ image_registry }}/coin-ops-proxy:{{ image_tag }}"
history_api_image: "{{ image_registry }}/coin-ops-history-api:{{ image_tag }}"
history_consumer_image: "{{ image_registry }}/coin-ops-history-consumer:{{ image_tag }}"
ui_image: "{{ image_registry }}/coin-ops-ui:{{ image_tag }}"
postgres_runtime_image: "{{ image_registry }}/coin-ops-postgres-runtime:{{ image_tag }}"
postgres_image: "{{ postgres_runtime_image if runtime_backend == 'postgres' else 'postgres:16-alpine' }}"
registry_username: "{{ lookup('env', 'GHCR_USERNAME') | default('', true) }}"
registry_token: "{{ lookup('env', 'GHCR_TOKEN') | default('', true) }}"

# Derived connection strings
rabbitmq_url: "amqp://{{ rabbitmq_user }}:{{ rabbitmq_password }}@{{ cloud_db_host }}:5672/"
database_url: "postgresql://{{ db_user }}:{{ db_password }}@localhost:5432/{{ db_name }}"
history_database_url: "postgresql://{{ db_user }}:{{ db_password }}@postgres:5432/{{ db_name }}"
proxy_database_url: "postgresql://{{ db_user }}:{{ db_password }}@{{ cloud_db_host }}:5432/{{ db_name }}"
redis_url: "redis://{{ cloud_db_host }}:6379/0"

