---
# deploy.yml — deploy all services.
# Safe to re-run on every code push.
#
#   ansible-playbook -i ansible/inventory ansible/deploy.yml

- name: Validate deployment contract
  hosts: localhost
  connection: local
  gather_facts: no
  tasks:
    - name: Validate configured runtime backend
      assert:
        that:
          - runtime_backend in ['external', 'postgres']
        fail_msg: |
          runtime_backend must be one of: external, postgres.
    - name: Validate configured Secret Manager authentication path
      assert:
        that:
          - secret_backend in ['gcp', 'aws', 'azure']
          - secret_backend != 'gcp' or gcp_project | length > 0
          - secret_backend != 'aws' or aws_region | length > 0
          - secret_backend != 'azure' or azure_key_vault_name | length > 0
        fail_msg: "Run the bootstrap for the configured secret backend and source the generated local env before running deploy."

- name: Authenticate Docker registry on workload nodes
  hosts: role_app_ui:role_app_backend
  become: yes
  pre_tasks:
    - name: Resolve runtime configuration for deploy
      include_role:
        name: runtime_config
  tasks:
    - name: Validate configured registry credentials before login
      assert:
        that:
          - registry_username | length > 0
          - registry_token | length > 0
        fail_msg: "Registry credentials are incomplete. Check {{ app_secret_name }} in the configured secret backend ({{ secret_backend }}) and ensure GHCR_TOKEN is populated."
      when: image_registry_host == 'ghcr.io'

    - name: Log in to configured container registry
      community.docker.docker_login:
        registry_url: "{{ image_registry_host }}"
        username: "{{ registry_username }}"
        password: "{{ registry_token }}"
        reauthorize: true
      no_log: true
      when:
        - registry_username | length > 0
        - registry_token | length > 0

    - name: Explain skipped registry login
      debug:
        msg: "GHCR_USERNAME/GHCR_TOKEN not set; assuming registry images are public."
      when: registry_username | length == 0 or registry_token | length == 0

- name: Deploy History Service (app-2)
  hosts: "{{ target_backend_group | default('role_app_backend') }}"
  become: yes
  pre_tasks:
    - name: Resolve runtime configuration for history
      include_role:
        name: runtime_config
  roles:
    - history

- name: Deploy Proxy Service (app-2)
  hosts: "{{ target_backend_group | default('role_app_backend') }}"
  become: yes
  pre_tasks:
    - name: Resolve runtime configuration for proxy
      include_role:
        name: runtime_config
  roles:
    - proxy

- name: Deploy Internal TLS Gateway (app-2)
  hosts: "{{ target_backend_group | default('role_app_backend') }}"
  become: yes
  roles:
    - backend_tls

- name: Deploy Web UI (app-1)
  hosts: "{{ target_ui_group | default('role_app_ui') }}"
  become: yes
  pre_tasks:
    - name: Resolve runtime configuration for UI
      include_role:
        name: runtime_config
  roles:
    - ui
