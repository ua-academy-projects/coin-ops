---
# deploy.yml — deploy all services.
# Safe to re-run on every code push.
#
#   ansible-playbook -i ansible/inventory ansible/deploy.yml

- name: Deploy Proxy Service (node-02)
  hosts: proxy
  become: yes
  roles:
    - proxy

- name: Deploy History Service (node-01)
  hosts: history
  become: yes
  roles:
    - history

- name: Build React UI (local)
  hosts: localhost
  connection: local
  vars:
    proxy_ip: "{{ hostvars[groups['proxy'][0]]['ansible_host'] | default('172.31.1.11') }}"
    history_ip: "{{ hostvars[groups['history'][0]]['ansible_host'] | default('172.31.1.10') }}"
  tasks:
    - name: Write .env from inventory
      copy:
        content: |
          VITE_PROXY_URL=http://{{ proxy_ip }}:{{ proxy_port }}
          VITE_HISTORY_URL=http://{{ history_ip }}:{{ history_port }}
        dest: "{{ playbook_dir }}/../ui-react/.env"

    - name: Check node_modules freshness
      stat:
        path: "{{ playbook_dir }}/../ui-react/node_modules/.package-lock.json"
      register: nm_lock

    - name: Check package-lock.json mtime
      stat:
        path: "{{ playbook_dir }}/../ui-react/package-lock.json"
      register: pkg_lock

    - name: Install npm dependencies (only when package-lock.json changed)
      command: npm ci
      args:
        chdir: "{{ playbook_dir }}/../ui-react"
      when: not nm_lock.stat.exists or pkg_lock.stat.mtime > nm_lock.stat.mtime

    - name: Build React app
      command: npm run build
      args:
        chdir: "{{ playbook_dir }}/../ui-react"

- name: Deploy Web UI (node-03)
  hosts: ui
  become: yes
  roles:
    - ui
