---
# deploy.yml — deploy all services.
# Safe to re-run on every code push.
#
#   source .env
#   ansible-playbook -i ansible/inventory ansible/deploy.yml

- name: Validate required environment variables
  hosts: localhost
  connection: local
  tasks:
    - name: Check .env vars are exported
      assert:
        that:
          - lookup('env', 'RABBITMQ_PASSWORD') != ''
          - lookup('env', 'DB_PASSWORD') != ''
          - lookup('env', 'SSH_KEY_PATH') != ''
        fail_msg: |
          Required environment variables are not set.
          Run:  source .env
          Then retry: ansible-playbook -i ansible/inventory ansible/deploy.yml

- name: Deploy History Service (node-01)
  hosts: history
  become: yes
  roles:
    - history

- name: Deploy Proxy Service (node-02)
  hosts: proxy
  become: yes
  roles:
    - proxy

- name: Deploy Web UI (node-03)
  hosts: ui
  become: yes
  roles:
    - ui
