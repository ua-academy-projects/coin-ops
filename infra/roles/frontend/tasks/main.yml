---
# tasks file for frontend
- name: Install frontend packages
  apt:
    name:
      - python3
      - python3-pip
      - python3-venv
      - python3-flask
      - redis-server
    state: present
    update_cache: yes

- name: Setup python environment
  pip:
    requirements: /home/vagrant/shared_folder/frontend/requirements.txt
    virtualenv: /home/vagrant/venv
    virtualenv_command: /usr/bin/python3 -m venv

- name: Start systemd redis-server
  systemd:
    name: redis-server
    enabled: yes
    state: started

- name: Generate frontend environment file
  template:
    src: frontend.env.j2
    dest: /home/vagrant/shared_folder/frontend/frontend.env
    owner: vagrant
    mode: "0600"
  notify: Restart Frontend

- name: Copy frontend systemd unit file to remote host
  copy:
    src: frontend.service
    dest: /etc/systemd/system/frontend.service
    mode: '0644'
  notify: Restart Frontend

- name: Setup systemd frontend service
  systemd:
    name: frontend
    enabled: yes
    state: started
    daemon_reload: yes
    