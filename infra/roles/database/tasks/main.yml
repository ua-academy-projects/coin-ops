---
# tasks file for database
- name: Install database packages
  apt:
    name:
      - postgresql
      - python3-psycopg2
    state: present
    update_cache: yes

- name: Allow PostgreSQL to listen on all interfaces
  lineinfile:
    path: "/etc/postgresql/{{ pg_version | default('16') }}/main/postgresql.conf"
    regexp: '^#listen_addresses'
    line: "listen_addresses = '*'"
  notify: Restart PostgreSQL

- name: Allow PostgreSQL to accept remote connections
  lineinfile:
    path: "/etc/postgresql/{{ pg_version | default('16') }}/main/pg_hba.conf"
    line: "host    all             all             {{ item }}            scram-sha-256"
    state: present
  loop: "{{ pg_allowed_networks | default(['10.10.1.0/24']) }}"
  notify: Restart PostgreSQL

- name: Apply PostgreSQL config before local init
  meta: flush_handlers

- name: Create database user
  postgresql_user:
    name: "{{ pg_user }}"
    password: "{{ pg_password }}"
    state: present
  become: yes
  become_user: postgres

- name: Create database
  postgresql_db:
    name: "{{ pg_database }}"
    owner: "{{ pg_user }}"
    state: present
  become: yes
  become_user: postgres

- name: Generate database initialization SQL from template
  template:
    src: init.sql.j2
    dest: /tmp/init.sql
    owner: postgres
    mode: "0600"
  become: yes
  become_user: postgres

- name: Apply database schema and tables
  command: psql -d {{ pg_database }} -f /tmp/init.sql
  become: yes
  become_user: postgres

- name: Start PostgreSQL service
  systemd:
    name: postgresql
    enabled: yes
    state: started
    daemon_reload: yes