version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: coinops_redis
    restart: unless-stopped
    # Порт 6379 відкритий всередині мережі Docker
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-alpine
    container_name: coinops_mq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    expose:
      # 5672 для AMQP з'єднань між контейнерами (внутрішній)
      - "5672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  proxy:
    build:
      context: ../services/proxy
    container_name: coinops_proxy
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - COINOPS_LISTEN=:8080
      - MQ_ENABLED=TRUE
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/
      - RABBITMQ_EXCHANGE=coinops.rates
      - RABBITMQ_ROUTING_KEY=rates.snapshot
      - NBU_API_URL=${NBU_API_URL}
      - COINGECKO_API_URL=${COINGECKO_API_URL}
      - COINGECKO_IDS=${COINGECKO_IDS}

  history_service:
    build:
      context: ../services/history_service
    container_name: coinops_history
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      # Змінні для підключення до VM database
      - PGHOST=${PGHOST}
      - PGPORT=${PGPORT}
      - PGUSER=${PGUSER}
      - PGPASSWORD=${PGPASSWORD}
      - PGDATABASE=${PGDATABASE}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/
      - RABBITMQ_EXCHANGE=coinops.rates
      - RABBITMQ_QUEUE=coinops.history
      - RABBITMQ_ROUTING_KEY=rates.snapshot
      - MQ_CONSUMER_ENABLED=true
      - HTTP_API_ENABLED=true
      - HISTORY_LISTEN=0.0.0.0
      - HISTORY_PORT=8090
    volumes:
      - ../services/history_service:/app

  frontend:
    build:
      context: ../services/frontend
    container_name: coinops_frontend
    restart: unless-stopped
    depends_on:
      proxy:
        condition: service_started
      history_service:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      - PROXY_URL=http://proxy:8080
      - HISTORY_API_URL=http://history_service:8090/api/v1/history
      - REDIS_URL=redis://redis:6379/0
      - FLASK_DEBUG=1
    volumes:
      - ../services/frontend:/app

  nginx:
    image: nginx:alpine
    container_name: coinops_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      frontend:
        condition: service_started

volumes:
  rabbitmq_data:
