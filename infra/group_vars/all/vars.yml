# Database (pg_user, pg_password — in vault.yml)
pg_host: "10.10.1.6"
pg_port: "5432"
pg_database: "coinops_db"

# RabbitMQ (rabbitmq_user, rabbitmq_password — in vault.yml)
rabbitmq_host: "10.10.1.5"
rabbitmq_port: "5672"
rabbitmq_exchange: "coinops.rates"
rabbitmq_queue: "coinops.history"
rabbitmq_routing_key: "rates.snapshot"
rabbitmq_url: "amqp://{{ rabbitmq_user }}:{{ rabbitmq_password }}@{{ rabbitmq_host }}:{{ rabbitmq_port }}/"

# Frontend
proxy_url: "http://10.10.1.3:8080"
history_api_url: "http://10.10.1.4:8090/api/v1/history"
redis_url: "redis://127.0.0.1:6379/0"

# History Service
history_listen: "0.0.0.0"
history_port: "8090"
mq_consumer_enabled: "true"
http_api_enabled: "true"

# Proxy
proxy_listen: ":8080"
mq_enabled: "TRUE"
