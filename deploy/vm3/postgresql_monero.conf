# postgresql.conf additions for Monero Privacy Analytics
# Place in /etc/postgresql/16/main/conf.d/monero.conf

# Connection tuning
max_connections = 100
shared_buffers = 256MB
effective_cache_size = 768MB
maintenance_work_mem = 64MB
work_mem = 4MB

# Write-ahead log
wal_buffers = 16MB
checkpoint_completion_target = 0.9

# Query planner
random_page_cost = 1.1
effective_io_concurrency = 200

# Logging
log_min_duration_statement = 500
log_line_prefix = '%t [%p] %u@%d '

# Connection limits for the monero user
# Also add to pg_hba.conf:
# host  monero_privacy  monero  BACKEND_VM2_IP/32  scram-sha-256
