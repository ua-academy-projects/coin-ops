services:
  ui:
    image: "{{ ui_image }}"
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      PROXY_URL: /api
      HISTORY_URL: /history-api
    volumes:
      - /opt/cognitor/ui/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/cognitor/tls:/etc/nginx/tls:ro
