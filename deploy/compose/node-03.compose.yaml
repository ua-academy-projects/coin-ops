services:
  ui:
    image: "{{ ui_image }}"
    restart: unless-stopped
    ports:
      - "443:443"
    env_file:
      - /etc/cognitor/ui.env
    volumes:
      - /opt/cognitor/ui/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/cognitor/tls:/etc/nginx/tls:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
