services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - /etc/cognitor/history.env
    volumes:
      - /var/lib/coin-ops/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-alpine
    restart: unless-stopped
    env_file:
      - /etc/cognitor/history.env
    ports:
      - "5672:5672"
    volumes:
      - /var/lib/coin-ops/rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

  history-consumer:
    image: "{{ history_consumer_image }}"
    restart: unless-stopped
    env_file:
      - /etc/cognitor/history.env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  history-api:
    image: "{{ history_api_image }}"
    restart: unless-stopped
    ports:
      - "{{ history_port }}:{{ history_port }}"
    env_file:
      - /etc/cognitor/history.env
    depends_on:
      postgres:
        condition: service_healthy
