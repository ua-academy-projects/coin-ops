services:
{% if database_backend == "local" %}
  postgres:
    image: "{{ postgres_image }}"
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${DB_USER:?}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:?}"
      POSTGRES_DB: "${DB_NAME:?}"
      RUNTIME_APP_ROLE: "${DB_USER:?}"
{% if runtime_backend == "postgres" %}
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_cron
      - -c
      - cron.database_name=${DB_NAME:?}
{% endif %}
    ports:
      - "{{ postgres_bind_ip }}:5432:5432"
    volumes:
      - /var/lib/coin-ops/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5
{% endif %}

{% if runtime_backend == "external" %}
  rabbitmq:
    image: rabbitmq:3-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_USER:?}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PASSWORD:?}"
    ports:
      - "5672:5672"
    volumes:
      - /var/lib/coin-ops/rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
{% endif %}

  history-consumer:
    image: "{{ history_consumer_image }}"
    restart: unless-stopped
    environment:
      RUNTIME_BACKEND: "{{ runtime_backend }}"
      DATABASE_URL: "${HISTORY_DATABASE_URL:?}"
{% if runtime_backend == "external" %}
      RABBITMQ_URL: "${RABBITMQ_URL:?}"
{% endif %}
      PORT: "{{ history_port }}"
    depends_on:
{% if database_backend == "local" %}
      postgres:
        condition: service_healthy
{% endif %}
{% if runtime_backend == "external" %}
      rabbitmq:
        condition: service_healthy
{% endif %}

  history-api:
    image: "{{ history_api_image }}"
    restart: unless-stopped
    ports:
      - "{{ history_port }}:{{ history_port }}"
    environment:
      RUNTIME_BACKEND: "{{ runtime_backend }}"
      DATABASE_URL: "${HISTORY_DATABASE_URL:?}"
{% if runtime_backend == "external" %}
      RABBITMQ_URL: "${RABBITMQ_URL:?}"
{% endif %}
      PORT: "{{ history_port }}"
    depends_on:
{% if database_backend == "local" %}
      postgres:
        condition: service_healthy
{% endif %}
{% if runtime_backend == "external" %}
      rabbitmq:
        condition: service_healthy
{% endif %}
