services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - /var/lib/coin-ops/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  proxy:
    image: "{{ proxy_image }}"
    restart: unless-stopped
    ports:
      - "{{ proxy_port }}:{{ proxy_port }}"
    env_file:
      - /etc/cognitor/proxy.env
    depends_on:
      redis:
        condition: service_healthy
