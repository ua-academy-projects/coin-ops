services:
{% if not use_managed_db %}
  postgres:
    image: "{{ postgres_image }}"
    restart: unless-stopped
    environment:
      POSTGRES_USER: "{{ db_user }}"
      POSTGRES_PASSWORD: "{{ db_password }}"
      POSTGRES_DB: "{{ db_name }}"
{% if runtime_backend == "postgres" %}
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_cron
      - -c
      - cron.database_name={{ db_name }}
{% endif %}
    ports:
      - "{{ postgres_bind_ip }}:5432:5432"
    volumes:
      - /var/lib/coin-ops/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5
{% endif %}

{% if runtime_backend == "external" %}
  rabbitmq:
    image: rabbitmq:3-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: "{{ rabbitmq_user }}"
      RABBITMQ_DEFAULT_PASS: "{{ rabbitmq_password }}"
    ports:
      - "5672:5672"
    volumes:
      - /var/lib/coin-ops/rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
{% endif %}

  history-consumer:
    image: "{{ history_consumer_image }}"
    restart: unless-stopped
    environment:
      RUNTIME_BACKEND: "{{ runtime_backend }}"
      DATABASE_URL: "{{ app_database_url }}"
      POSTGRES_USER: "{{ db_user }}"
      POSTGRES_PASSWORD: "{{ db_password }}"
      POSTGRES_DB: "{{ db_name }}"
      RUNTIME_APP_ROLE: "{{ db_user }}"
{% if runtime_backend == "external" %}
      RABBITMQ_URL: "{{ internal_rabbitmq_url }}"
      RABBITMQ_DEFAULT_USER: "{{ rabbitmq_user }}"
      RABBITMQ_DEFAULT_PASS: "{{ rabbitmq_password }}"
{% endif %}
      PORT: "{{ history_port }}"
{% if not use_managed_db or runtime_backend == "external" %}
    depends_on:
{% if not use_managed_db %}
      postgres:
        condition: service_healthy
{% endif %}
{% if runtime_backend == "external" %}
      rabbitmq:
        condition: service_healthy
{% endif %}
{% endif %}

  history-api:
    image: "{{ history_api_image }}"
    restart: unless-stopped
    ports:
      - "{{ history_port }}:{{ history_port }}"
    environment:
      RUNTIME_BACKEND: "{{ runtime_backend }}"
      DATABASE_URL: "{{ app_database_url }}"
      POSTGRES_USER: "{{ db_user }}"
      POSTGRES_PASSWORD: "{{ db_password }}"
      POSTGRES_DB: "{{ db_name }}"
      RUNTIME_APP_ROLE: "{{ db_user }}"
{% if runtime_backend == "external" %}
      RABBITMQ_URL: "{{ internal_rabbitmq_url }}"
      RABBITMQ_DEFAULT_USER: "{{ rabbitmq_user }}"
      RABBITMQ_DEFAULT_PASS: "{{ rabbitmq_password }}"
{% endif %}
      PORT: "{{ history_port }}"
{% if not use_managed_db %}
    depends_on:
      postgres:
        condition: service_healthy
{% endif %}
