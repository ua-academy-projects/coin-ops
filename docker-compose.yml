services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cognitor
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: cognitor
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-alpine
    environment:
      RABBITMQ_DEFAULT_USER: cognitor
      RABBITMQ_DEFAULT_PASS: changeme
    ports:
      - "5672:5672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  history-api:
    build:
      context: ./history
      dockerfile: Dockerfile.api
    environment:
      DATABASE_URL: postgresql://cognitor:changeme@postgres:5432/cognitor
      PORT: "8000"
      RUNTIME_BACKEND: ${RUNTIME_BACKEND:-external}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  history-consumer:
    build:
      context: ./history
      dockerfile: Dockerfile.consumer
    environment:
      DATABASE_URL: postgresql://cognitor:changeme@postgres:5432/cognitor
      RABBITMQ_URL: amqp://cognitor:changeme@rabbitmq:5672/
      RUNTIME_BACKEND: ${RUNTIME_BACKEND:-external}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  proxy:
    build:
      context: ./proxy
    environment:
      RABBITMQ_URL: amqp://cognitor:changeme@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/0
      PORT: "8080"
      DATABASE_URL: ${DATABASE_URL:-postgresql://cognitor:changeme@postgres:5432/cognitor}
      RUNTIME_BACKEND: ${RUNTIME_BACKEND:-external}
    ports:
      - "8080:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  ui:
    build:
      context: ./ui-react
    environment:
      PROXY_URL: /api
      HISTORY_URL: /history-api
    ports:
      - "5000:80"
    volumes:
      - ./nginx.local.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - proxy
      - history-api

volumes:
  postgres-data:
