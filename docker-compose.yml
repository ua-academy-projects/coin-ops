version: "3.8"

services:
  db:
    image: postgres:15-alpine
    env_file: .env
    volumes:
      - ./weather_history.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    env_file: .env
    ports:
      - "5672:5672"
      - "15672:15672"

  history:
    build:
      context: ./history
    restart: always
    env_file: .env
    depends_on:
      - db
      - rabbitmq
    ports:
      - "8000:8000"

  backend:
    build:
      context: ./backend
    restart: always
    env_file: .env
    depends_on:
      - history
      - rabbitmq
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
