version: "3.9"

# ── Local dev stack (mirrors 3-VM production topology) ─────────────────────
# Mimics: VM1=frontend, VM2=backend+worker, VM3=db
# Usage: docker compose up --build

services:

  # ── VM3 equivalent: PostgreSQL ───────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: monero_db
    environment:
      POSTGRES_USER: monero
      POSTGRES_PASSWORD: monero
      POSTGRES_DB: monero_privacy
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monero -d monero_privacy"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── VM4 equivalent: Redis ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: monero_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # ── VM5 equivalent: RabbitMQ ─────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: monero_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  # ── VM2 equivalent: FastAPI backend ──────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: monero_api
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql+asyncpg://monero:monero@db:5432/monero_privacy
      DATABASE_URL_SYNC: postgresql://monero:monero@db:5432/monero_privacy
      MONERO_RPC_HOST: xmr-node.cakewallet.com
      MONERO_RPC_PORT: 18081
      WORKER_INTERVAL_SECONDS: "10"
      REDIS_URL: "redis://redis:6379/0"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  # ── VM2 equivalent: Worker ────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: monero_worker
    command: python worker/worker.py
    environment:
      DATABASE_URL: postgresql+asyncpg://monero:monero@db:5432/monero_privacy
      DATABASE_URL_SYNC: postgresql://monero:monero@db:5432/monero_privacy
      MONERO_RPC_HOST: xmr-node.cakewallet.com
      MONERO_RPC_PORT: 18081
      WORKER_INTERVAL_SECONDS: "10"
      REDIS_URL: "redis://redis:6379/0"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    volumes:
      - ./backend:/app

  # ── VM1 equivalent: React frontend (dev server) ───────────────────────────
  frontend:
    image: node:20-alpine
    container_name: monero_frontend
    working_dir: /app
    command: sh -c "npm install && npm start"
    environment:
      REACT_APP_API_URL: http://localhost:8000
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    depends_on:
      - api

  # ── Optional: monerod stagenet for local testing ──────────────────────────
  # Uncomment if you want a local Monero node (uses ~10GB disk)
  # monerod:
  #   image: sethsimmons/simple-monerod:latest
  #   container_name: monerod
  #   command: >
  #     --stagenet
  #     --rpc-bind-ip=0.0.0.0
  #     --rpc-bind-port=18081
  #     --confirm-external-bind
  #   ports:
  #     - "18081:18081"
  #   volumes:
  #     - monerod_data:/home/monero/.bitmonero

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  # monerod_data:
